"values\"]` is a list of values to compare against\n- Field names in `extra[\"fields\"]` match exactly what's in your node schema", "active_commits": [9]}, {"id": "Quality_Debugging_5797c1eecd", "name": "- **Defaulting required data**...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "active_commits": [5]}, {"id": "Quality_Debugging_5251e7b84f", "name": "- **Harmful try/except blocks*...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.", "active_commits": [5]}, {"id": "Quality_Debugging_5d688c5919", "name": "- **Logs**: Look for import er...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "active_commits": [1, 2, 6, 8]}, {"id": "Quality_Debugging_aca76ae54d", "name": "- **Redundant attribute guards...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.", "active_commits": [5]}, {"id": "Quality_Debugging_9f74b89e51", "name": "- Avoid using `hasattr()`/`get...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.", "active_commits": [5]}, {"id": "Quality_Debugging_0d2596f773", "name": "- If you're confident data sho...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.", "active_commits": [5]}, {"id": "Quality_Debugging_0a32dbb2c9", "name": "- Lean toward propagating erro...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.", "active_commits": [5]}, {"id": "Quality_Debugging_b647e16c47", "name": "- Never manufacture \"safe\" def...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "active_commits": [5]}, {"id": "Quality_Debugging_393f26a34b", "name": "- When key assumptions your co...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.", "active_commits": [5]}, {"id": "Quality_Debugging_4c19648fb8", "name": "1. **Check existing patterns f...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "active_commits": [6]}, {"id": "Quality_Debugging_0b1ba957f2", "name": "4. **Validate Neo4j queries**:...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working", "active_commits": [2]}, {"id": "Quality_Debugging_6091407464", "name": "Cartography (both the backend ...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "Cartography (both the backend ingestion jobs and any frontend surfaces that consume their results)\nlikes to fail loudly so that broken assumptions bubble exceptions up to operators instead of being\npapered over.", "active_commits": [5, 6]}, {"id": "Quality_Debugging_6fd5e107b3", "name": "```python\n# \u274c Problem: \"Proper...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: \"PropertyRef validation failed\"\n# \u2705 Solution: Check dataclass syntax and PropertyRef definitions\n@dataclass(frozen=True)  # Don't forget frozen=True!\nclass YourNodeProperties(CartographyNodeProperties):\n    id: PropertyRef = PropertyRef(\"id\")  # Must have type annotation\n```", "active_commits": [2]}, {"id": "Quality_Debugging_9c2612eb54", "name": "```python\n# \u274c Problem: Adding ...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: Adding custom fields to schema classes\n# \u2705 Solution: Remove them - only standard fields are recognized by the loading system\n@dataclass(frozen=True)\nclass MyRel(CartographyRelSchema):\n    # Remove any custom fields like these:\n    # conditional_match_property: str = \"some_field\"  # \u274c Ignored\n    # custom_flag: bool = True                        # \u274c Ignored\n    # extra_config: dict = {}                         # \u274c Ignored\n\n    # Keep only the standard relationship fields\n    target_node_label: str = \"TargetNode\"\n    target_node_matcher: TargetNodeMatcher = make_target_node_matcher(...)\n    direction: LinkDirection = LinkDirection.OUTWARD\n    rel_label: str = \"CONNECTS_TO\"\n    properties: MyRelProperties = MyRelProperties()\n```", "active_commits": [2]}, {"id": "Quality_Debugging_4537597342", "name": "```python\n# \u274c Problem: KeyErro...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: KeyError during transform\n# \u2705 Solution: Handle required vs optional fields correctly\n{\n    \"id\": data[\"id\"],                    # Required - let it fail\n    \"name\": data.get(\"name\"),            # Optional - use .get()\n    \"email\": data.get(\"email\", \"\"),      # \u274c Don't use empty string default\n    \"email\": data.get(\"email\"),          # \u2705 Use None default\n}\n```", "active_commits": [2]}, {"id": "Quality_Debugging_28fddfd103", "name": "```python\n# \u274c Problem: ModuleN...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: ModuleNotFoundError for your new module\n# \u2705 Solution: Ensure __init__.py files exist in all directories\ncartography/intel/your_service/__init__.py\ncartography/models/your_service/__init__.py\n```", "active_commits": [2]}, {"id": "Quality_Debugging_dd7561cecd", "name": "```python\n# \u274c Problem: Relatio...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: Relationships not created\n# \u2705 Solution: Ensure target nodes exist before creating relationships\n# Load parent nodes first:\nload(neo4j_session, TenantSchema(), tenant_data, lastupdated=update_tag)\n# Then load child nodes with relationships:\nload(neo4j_session, UserSchema(), user_data, lastupdated=update_tag, TENANT_ID=tenant_id)\n```", "active_commits": [2]}, {"id": "Quality_Debugging_29d7865c0d", "name": "```python\n# \u274c Problem: Slow qu...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n\nNote though that if a field is referred to in a target node matcher, it will be indexed automatically.\n```", "active_commits": [2]}, {"id": "Quality_Maintenance_10f6aa9302", "name": "### Cleanup Jobs\n\nAlways imple...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "### Cleanup Jobs\n\nAlways implement cleanup to remove stale data:\n\n```python\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    \"\"\"\n    Remove nodes that weren't updated in this sync run\n    \"\"\"\n    logger.debug(\"Running Your Service cleanup job\")\n\n    # Cleanup users\n    GraphJob.from_node_schema(YourServiceUserSchema(), common_job_parameters).run(neo4j_session)\n```", "active_commits": [5]}, {"id": "Quality_Maintenance_969dcd7888", "name": "#### 3a. Remove Index Entries\n...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "active_commits": [3, 4]}, {"id": "Quality_Maintenance_270c48ef6b", "name": "#### 3b. Remove Cleanup Job Fi...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "#### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "active_commits": [3]}, {"id": "Quality_Maintenance_62bb548906", "name": "#### Multiple Intel Modules Mo...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "#### Multiple Intel Modules Modifying Same Nodes\nWhen refactoring modules that modify the same node type:\n- Use **Simple Relationship Pattern** if only referencing by ID\n- Use **Composite Node Pattern** for different views of the same entity from different data sources (see [Common Patterns](#common-patterns))", "active_commits": [5]}, {"id": "Quality_Maintenance_271873db66", "name": "**IMPORTANT**: A critical task...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "**IMPORTANT**: A critical task for AI agents is refactoring legacy Cartography code from handwritten Cypher queries to the modern data model approach. This section provides a step-by-step procedure to safely perform these refactors.", "active_commits": [3, 6]}, {"id": "Quality_Maintenance_41703fe6f1", "name": "A successful refactor should:\n...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "A successful refactor should:\n1. **Preserve all functionality** - tests pass\n2. **Use data model** - no handwritten Cypher for CRUD operations\n3. **Clean up legacy files** - indexes and cleanup jobs removed\n4. **Maintain performance** - no significant speed degradation\n5. **Follow patterns** - consistent with other modern modules", "active_commits": [3, 6, 7]}, {"id": "Quality_Maintenance_66843b31e0", "name": "Always implement cleanup to re...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "Always implement cleanup to remove stale data:", "active_commits": [3, 4, 6, 7, 8, 9]}, {"id": "Quality_Maintenance_25f75b9844", "name": "Before submitting a refactor:\n...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "Before submitting a refactor:\n\n- [ ] \u2705 **Integration test exists and passes** for the sync function\n- [ ] \u2705 **Data model schemas** defined with proper relationships\n- [ ] \u2705 **Legacy load functions** converted to use `load()`\n- [ ] \u2705 **Legacy cleanup functions** converted to use `GraphJob.from_node_schema()`\n- [ ] \u2705 **Tests still pass** after all changes\n- [ ] \u2705 **Index entries removed** from `indexes.cypher`\n- [ ] \u2705 **Cleanup JSON files removed** from cleanup directory\n- [ ] \u2705 **No regressions** - all functionality preserved", "active_commits": [7]}, {"id": "Quality_Maintenance_716d1b9a5d", "name": "Before submitting your module:...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "Before submitting your module:\n\n- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields .id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "active_commits": [2, 6, 9]}, {"id": "Quality_Maintenance_9ac77a8605", "name": "Some legacy queries are comple...", "category": "Quality", "label": "Maintenance", "cat_color": "#4DAF4A", "raw_text": "Some legacy queries are complex. Break them down:\n1. Identify what nodes/relationships are being created\n2. Map to data model schemas\n3. Use multiple `load()` calls if needed", "active_commits": [2]}, {"id": "Quality_Performance_5c4ae08734", "name": "MatchLinks have significant pe...", "category": "Quality", "label": "Performance", "cat_color": "#4DAF4A", "raw_text": "MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph", "active_commits": [2, 3, 4, 5, 6, 7, 8, 9]}, {"id": "Quality_Performance_562b7b560b", "name": "Note though that if a field is...", "category": "Quality", "label": "Performance", "cat_color": "#4DAF4A", "raw_text": "Note though that if a field is referred to in a target node matcher, it will be indexed automatically.", "active_commits": [2, 3, 4, 6, 8]}, {"id": "Quality_Performance_29d7865c0d", "name": "```python\n# \u274c Problem: Slow qu...", "category": "Quality", "label": "Performance", "cat_color": "#4DAF4A", "raw_text": "```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n```", "active_commits": [5, 7, 9]}, {"id": "Quality_Security_cb6776e974", "name": "**Access Control**: Tenant rel...", "category": "Quality", "label": "Security", "cat_color": "#4DAF4A", "raw_text": "**Access Control**: Tenant relationships enable proper access control and data isolation", "active_commits": [5]}, {"id": "Quality_Security_2b472134c4", "name": "Cartography includes a powerfu...", "category": "Quality", "label": "Security", "cat_color": "#4DAF4A", "raw_text": "Cartography includes a powerful rules system that allows you to write security queries to identify potential attack surfaces, security gaps, and compliance issues across your infrastructure. The ontology system makes it easy to write rules that work across multiple cloud providers and services.", "active_commits": [1]}, {"id": "Quality_Security_2f985f84cf", "name": "Each Rule must define an outpu...", "category": "Quality", "label": "Security", "cat_color": "#4DAF4A", "raw_text": "Each Rule must define an output model extending `Finding`:\n\n```python\nfrom cartography.rules.spec.model import Finding\n\nclass MyRuleOutput(Finding):\n    \"\"\"Output model for my custom rule.\"\"\"\n\n    # Define fields that will be populated from cypher_query results\n    id: str | None = None              # Resource identifier\n    email: str | None = None           # User email\n    region: str | None = None          # Cloud region\n    public_access: bool | None = None  # Access level\n```\n\n**Key Points:**\n- **Inherit from `Finding`**: Your model must extend the base class\n- **Match Query Aliases**: Field names must match `cypher_query` aliases\n- **Automatic Handling**: The `source` field is auto-populated with module name", "active_commits": [1]}, {"id": "Quality_Security_0b9c4151f0", "name": "Use semantic versioning for ru...", "category": "Quality", "label": "Security", "cat_color": "#4DAF4A", "raw_text": "Use semantic versioning for rules:\n\n```python\nversion=\"0.1.0\"  # Initial release\nversion=\"0.2.0\"  # Added new facts (minor)\nversion=\"0.2.1\"  # Bug fix (patch)\nversion=\"1.0.0\"  # Production ready (major)\n```", "active_commits": [1]}]};
        const commits = data.commits;
        const rules = data.rules;
        
        // Dimensions
        const margin = {top: 40, right: 40, bottom: 20, left: 250};
        const commitWidth = 40;
        const width = Math.max(800, margin.left + (commits.length * commitWidth) + margin.right);
        
        // Calcular altura dinámica basada en agrupaciones
        let currentY = margin.top;
        let yPositions = {};
        let drawCalls = [];
        
        let currentCat = null;
        let currentLabel = null;
        
        rules.forEach(rule => {
            if(rule.category !== currentCat) {
                currentCat = rule.category;
                currentLabel = null;
                drawCalls.push({ type: 'category', text: currentCat, y: currentY, color: rule.cat_color });
                currentY += 30;
            }
            if(rule.label !== currentLabel) {
                currentLabel = rule.label;
                drawCalls.push({ type: 'label', text: currentLabel, y: currentY });
                currentY += 25;
            }
            
            yPositions[rule.id] = currentY;
            drawCalls.push({ type: 'rule', rule: rule, y: currentY });
            currentY += 20;
        });
        
        const height = currentY + margin.bottom;

        const svg = d3.select("#viz-container").append("svg")
            .attr("width", width)
            .attr("height", height);
            
        // Escala X para commits
        const xScale = d3.scalePoint()
            .domain(d3.range(commits.length))
            .range([margin.left, width - margin.right])
            .padding(0.5);
            
        // Eje X (Commits arriba)
        const xAxis = svg.append("g")
            .attr("transform", `translate(0, ${margin.top - 10})`);
            
        commits.forEach((c, i) => {
            xAxis.append("text")
                .attr("class", "axis-text")
                .attr("x", xScale(i))
                .attr("y", 0)
                .attr("text-anchor", "middle")
                .text(c.substring(0, 6));
                
            // Grid lines verticales
            svg.append("line")
                .attr("x1", xScale(i)).attr("x2", xScale(i))
                .attr("y1", margin.top).attr("y2", height - margin.bottom)
                .attr("stroke", "#f1f5f9").attr("stroke-dasharray", "4,4");
        });

        const tooltip = d3.select("#tooltip");

        // Dibujar Y-Axis (Estructura)
        drawCalls.forEach(item => {
            if (item.type === 'category') {
                svg.append("rect")
                    .attr("x", 10).attr("y", item.y - 18)
                    .attr("width", margin.left - 20).attr("height", 24)
                    .attr("fill", item.color).attr("opacity", 0.2).attr("rx", 4);
                svg.append("text")
                    .attr("class", "category-text")
                    .attr("x", 15).attr("y", item.y).text(item.text);
                    
                // Separador horizontal
                svg.append("line").attr("x1", 10).attr("x2", width - margin.right)
                    .attr("y1", item.y + 8).attr("y2", item.y + 8)
                    .attr("stroke", item.color).attr("stroke-opacity", 0.3);
            } 
            else if (item.type === 'label') {
                svg.append("text")
                    .attr("class", "label-text")
                    .attr("x", 30).attr("y", item.y).text("↳ " + item.text);
            } 
            else if (item.type === 'rule') {
                const r = item.rule;
                // Etiqueta de la regla
                svg.append("text")
                    .attr("class", "rule-text")
                    .attr("x", 45).attr("y", item.y + 4)
                    .text(r.name.length > 30 ? r.name.substring(0,27)+"..." : r.name)
                    .on("mouseover", (e) => {
                        tooltip.style("opacity", 1)
                            .html(`<strong>${r.name}</strong><br>Added in: Commit ${r.active_commits[0]}<pre>${r.raw_text}</pre>`);
                    })
                    .on("mousemove", (e) => tooltip.style("left", (e.pageX + 15) + "px").style("top", (e.pageY + 15) + "px"))
                    .on("mouseout", () => tooltip.style("opacity", 0));

                // Fondo de línea de vida (gris tenue para todo el rango posible)
                svg.append("line")
                    .attr("class", "lifeline-bg")
                    .attr("x1", xScale(0)).attr("x2", xScale(commits.length - 1))
                    .attr("y1", item.y).attr("y2", item.y);

                // Dibujar segmentos activos continuos
                let segments = [];
                let currentSeg = [];
                
                r.active_commits.sort((a,b)=>a-b).forEach(idx => {
                    if (currentSeg.length === 0) {
                        currentSeg.push(idx);
                    } else if (idx === currentSeg[currentSeg.length - 1] + 1) {
                        currentSeg.push(idx);
                    } else {
                        segments.push([...currentSeg]);
                        currentSeg = [idx];
                    }
                });
                if (currentSeg.length > 0) segments.push(currentSeg);

                segments.forEach(seg => {
                    const startX = xScale(seg[0]);
                    const endX = xScale(seg[seg.length - 1]);
                    
                    svg.append("line")
                        .attr("class", "lifeline-active")
                        .attr("stroke", r.cat_color)
                        .attr("x1", startX).attr("x2", startX === endX ? startX + 5 : endX)
                        .attr("y1", item.y).attr("y2", item.y)
                        .on("mouseover", (e) => {
                            tooltip.style("opacity", 1)
                                .html(`<strong>Active Segment</strong><br>From commit index ${seg[0]} to ${seg[seg.length-1]}`);
                        })
                        .on("mousemove", (e) => tooltip.style("left", (e.pageX + 15) + "px").style("top", (e.pageY + 15) + "px"))
                        .on("mouseout", () => tooltip.style("opacity", 0));
                        
                    // Dibujar circulitos en cada commit donde existe
                    seg.forEach(idx => {
                        svg.append("circle")
                            .attr("cx", xScale(idx)).attr("cy", item.y)
                            .attr("r", 3).attr("fill", "#fff")
                            .attr("stroke", r.cat_color).attr("stroke-width", 2);
                    });
                });
            }
        });
    </script>
