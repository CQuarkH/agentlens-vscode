8, 9]}, {"id": "General_AI Integration_d54f56567f", "name": "**Sync Pattern**: `get()` -> `...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "**Sync Pattern**: `get()` -> `transform()` -> `load()` -> `cleanup()`", "active_commits": [0]}, {"id": "General_AI Integration_a3aa9def62", "name": "**Update Tag**: Timestamp used...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "**Update Tag**: Timestamp used for cleanup jobs to remove stale data", "active_commits": [0]}, {"id": "General_AI Integration_e06004c02a", "name": "- **CRITICAL**: Run the test a...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "- **CRITICAL**: Run the test and ensure it passes before proceeding\n- If the test doesn't exist or fails, fix it first - **no exceptions**", "active_commits": [1, 4, 7, 9]}, {"id": "General_AI Integration_73aed58f8b", "name": "- Check existing patterns in `...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "- Check existing patterns in `cartography/intel/` before creating new ones\n- Ensure `__init__.py` files exist in all module directories\n- Look at `tests/integration/cartography/intel/` for similar test patterns\n- Review `cartography/models/` for existing relationship patterns", "active_commits": [0]}, {"id": "General_AI Integration_4c19648fb8", "name": "1. **Check existing patterns f...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "General_AI Integration_46e94a9d29", "name": "2. **Verify data model imports...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct", "active_commits": [2]}, {"id": "General_AI Integration_26d182552d", "name": "3. **Test transform functions*...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "3. **Test transform functions**: Always test data transformation logic with real API responses", "active_commits": [2]}, {"id": "General_AI Integration_d2706384c0", "name": "5. **Check file naming**: Modu...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "active_commits": [2]}, {"id": "General_AI Integration_0b8b73467f", "name": "Refactors can be complex. **St...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "Refactors can be complex. **Stop and ask the user** if you encounter:\n- Unclear business logic in legacy Cypher\n- Complex relationships that don't map clearly to data model\n- Test failures you can't resolve\n- Multiple modules that seem interdependent", "active_commits": [9]}, {"id": "General_AI Integration_e6a2ac0a7b", "name": "The fastest way to get started...", "category": "General", "label": "AI Integration", "cat_color": "#E41A1C", "raw_text": "The fastest way to get started is to copy the structure from an existing module:\n\n- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "active_commits": [3]}, {"id": "General_Documentation_8231b35141", "name": "**Critical Files to Know:**\n- ...", "category": "General", "label": "Documentation", "cat_color": "#E41A1C", "raw_text": "**Critical Files to Know:**\n- `cartography/config.py` - Configuration object definitions\n- `cartography/cli.py` - Command-line argument definitions\n- `cartography/client/core/tx.py` - Core `load()` function\n- `cartography/graph/job.py` - Cleanup job utilities\n- `cartography/models/core/` - Base data model classes", "active_commits": [0, 3, 7]}, {"id": "General_Documentation_5d688c5919", "name": "- **Logs**: Look for import er...", "category": "General", "label": "Documentation", "cat_color": "#E41A1C", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "active_commits": [3, 4, 5]}, {"id": "General_Documentation_bce9942e86", "name": "- **Simple module**: `cartogra...", "category": "General", "label": "Documentation", "cat_color": "#E41A1C", "raw_text": "- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "active_commits": [0, 4, 7]}, {"id": "General_Documentation_3a0dc6c238", "name": "For detailed step-by-step inst...", "category": "General", "label": "Documentation", "cat_color": "#E41A1C", "raw_text": "For detailed step-by-step instructions, see [Creating a New Module](docs/agents/create-module.md).", "active_commits": [0]}, {"id": "General_Documentation_472aee7376", "name": "Use Python 3.9+ style type hin...", "category": "General", "label": "Documentation", "cat_color": "#E41A1C", "raw_text": "Use Python 3.9+ style type hints throughout your code:\n\n```python\n# \u2705 DO: Use built-in type hints (Python 3.9+)\ndef get_users(api_key: str) -> dict[str, Any]:\n    ...\n\ndef transform(data: list[dict[str, Any]]) -> list[dict[str, Any]]:\n    ...\n\n# \u274c DON'T: Use objects from typing module\ndef get_users(api_key: str) -> Dict[str, Any]:\n    ...\n\ndef transform(data: List[Dict[str, Any]]) -> List[Dict[str, Any]]:\n    ...\n\n# \u2705 DO: Use union operator for optional types\ndef process_user(user_id: str | None) -> None:\n    ...\n\n# \u274c DON'T: Use Optional from typing\ndef process_user(user_id: Optional[str]) -> None:\n    ...\n```", "active_commits": [5, 8]}, {"id": "General_System Overview_8231b35141", "name": "**Critical Files to Know:**\n- ...", "category": "General", "label": "System Overview", "cat_color": "#E41A1C", "raw_text": "**Critical Files to Know:**\n- `cartography/config.py` - Configuration object definitions\n- `cartography/cli.py` - Command-line argument definitions\n- `cartography/client/core/tx.py` - Core `load()` function\n- `cartography/graph/job.py` - Cleanup job utilities\n- `cartography/models/core/` - Base data model classes", "active_commits": [1]}, {"id": "General_System Overview_4da379d948", "name": "**Key Cartography Concepts:**\n...", "category": "General", "label": "System Overview", "cat_color": "#E41A1C", "raw_text": "**Key Cartography Concepts:**\n- **Intel Module**: Component that fetches data from external APIs and loads into Neo4j\n- **Sync Pattern**: `get()` \u2192 `transform()` \u2192 `load()` \u2192 `cleanup()`\n- **Data Model**: Declarative schema using `CartographyNodeSchema` and `CartographyRelSchema`\n- **Update Tag**: Timestamp used for cleanup jobs to remove stale data", "active_commits": [1]}, {"id": "Implementation_Architecture_e2b2194136", "name": "**Composite Node Pattern**: Wh...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "active_commits": [1, 2, 4, 5, 7, 8, 9]}, {"id": "Implementation_Architecture_1fe691a543", "name": "**Data Model**: Declarative sc...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Data Model**: Declarative schema using `CartographyNodeSchema` and `CartographyRelSchema`", "active_commits": [2]}, {"id": "Implementation_Architecture_99b5780f3e", "name": "**Intel Module**: Component th...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Intel Module**: Component that fetches data from external APIs and loads into Neo4j", "active_commits": [2, 8]}, {"id": "Implementation_Architecture_4da379d948", "name": "**Key Cartography Concepts:**\n...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Key Cartography Concepts:**\n- **Intel Module**: Component that fetches data from external APIs and loads into Neo4j\n- **Sync Pattern**: `get()` \u2192 `transform()` \u2192 `load()` \u2192 `cleanup()`\n- **Data Model**: Declarative schema using `CartographyNodeSchema` and `CartographyRelSchema`\n- **Update Tag**: Timestamp used for cleanup jobs to remove stale data", "active_commits": [5]}, {"id": "Implementation_Architecture_cf610a50f6", "name": "**Prefer standard node schemas...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Prefer standard node schemas + relationship schemas** whenever possible:", "active_commits": [4, 7, 8, 9]}, {"id": "Implementation_Architecture_7b336eeead", "name": "**Relationship Directions:**\n-...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Relationship Directions:**\n- `LinkDirection.OUTWARD`: `(:YourServiceUser)-[:RESOURCE]->(:YourServiceTenant)`\n- `LinkDirection.INWARD`: `(:YourServiceUser)<-[:RESOURCE]-(:YourServiceTenant)`", "active_commits": [5]}, {"id": "Implementation_Architecture_6f898a929e", "name": "**Semantic Labels (Recommended...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property\n\n**Canonical Nodes (Legacy)**: Creates separate abstract `User`/`Device` nodes:\n- \u26a0\ufe0f More complex - requires separate node creation and relationship management\n- \u26a0\ufe0f Additional storage overhead\n- \u2705 Useful when you need to aggregate data from multiple sources into single entities", "active_commits": [1]}, {"id": "Implementation_Architecture_6f4569b2af", "name": "**Simple Relationship Pattern*...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "active_commits": [1, 2, 4, 5, 7, 8, 9]}, {"id": "Implementation_Architecture_d54f56567f", "name": "**Sync Pattern**: `get()` \u2192 `t...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Sync Pattern**: `get()` \u2192 `transform()` \u2192 `load()` \u2192 `cleanup()`", "active_commits": [2]}, {"id": "Implementation_Architecture_a3aa9def62", "name": "**Update Tag**: Timestamp used...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Update Tag**: Timestamp used for cleanup jobs to remove stale data", "active_commits": [2]}, {"id": "Implementation_Architecture_f8b76f5c6d", "name": "**Why This Matters:**\n1. **Cle...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**Why This Matters:**\n1. **Cleanup Operations**: Cartography uses the sub-resource relationship to determine which data to clean up during sync operations\n2. **Data Organization**: Tenant-like objects provide natural boundaries for data organization\n3. **Access Control**: Tenant relationships enable proper access control and data isolation\n4. **Consistency**: Following this pattern ensures consistent data modeling across all modules", "active_commits": [2, 5, 6, 8]}, {"id": "Implementation_Architecture_47efa67a59", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "active_commits": [1, 2, 4, 5, 7, 8, 9]}, {"id": "Implementation_Architecture_283ca4bb7d", "name": "**\u2705 Correct Examples:**\n- **AW...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "active_commits": [1, 4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Architecture_fcf2c0342c", "name": "**\u274c Don't use MatchLinks for:*...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "active_commits": [1, 4, 8, 9]}, {"id": "Implementation_Architecture_f7194ba669", "name": "- **Inherit from `Finding`**: ...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "- **Inherit from `Finding`**: Your model must extend the base class\n- **Match Query Aliases**: Field names must match `cypher_query` aliases\n- **Automatic Handling**: The `source` field is auto-populated with module name", "active_commits": [3]}, {"id": "Implementation_Architecture_2f985f84cf", "name": "Each Rule must define an outpu...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "Each Rule must define an output model extending `Finding`:", "active_commits": [3]}, {"id": "Implementation_Architecture_d5e855ae4e", "name": "Every Cartography intel module...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "Every Cartography intel module follows this structure:", "active_commits": [3, 7]}, {"id": "Implementation_Architecture_f235860baa", "name": "It is possible (and encouraged...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "It is possible (and encouraged) for more than one intel module to modify the same node type. However, there are two distinct patterns for this:", "active_commits": [5]}, {"id": "Implementation_Architecture_11c6a7cb10", "name": "Rules use a simple two-level h...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "Rules use a simple two-level hierarchy:\n\n```\nRule (e.g., \"unmanaged-accounts\")\n  \u2514\u2500 Fact (e.g., \"unmanaged-accounts-ontology\")\n```\n\n- **Rule**: Represents a security issue or attack surface (e.g., \"User accounts not linked to a user identity\")\n- **Fact**: Individual Cypher query that gathers evidence about your environment\n- **Finding**: Pydantic model that defines the structure of results", "active_commits": [3, 6]}, {"id": "Implementation_Architecture_bd0caaf1b7", "name": "The Ontology system works in t...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "The Ontology system works in two ways:\n1. **Semantic Labels**: Adds semantic labels (like `UserAccount`) and prefixed properties (`_ont_*`) directly to source nodes for cross-module querying during ingestion\n2. **Canonical Nodes**: Creates canonical node (like `(:User:Ontology)`) that represent unified entities", "active_commits": [3, 6]}, {"id": "Implementation_Architecture_0e3d62e2ee", "name": "The `sub_resource_relationship...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "active_commits": [1, 2, 4, 5, 7, 8, 9]}, {"id": "Implementation_Architecture_13e20c4525", "name": "The key distinction is whether...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "active_commits": [1, 2, 4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Architecture_cb37983c68", "name": "Use semantic versioning for ru...", "category": "Implementation", "label": "Architecture", "cat_color": "#984EA3", "raw_text": "Use semantic versioning for rules:", "active_commits": [3]}, {"id": "Implementation_Impl. Details_bde1ba0247", "name": "### File Structure Template\n\n`...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### File Structure Template\n\n```\ncartography/intel/your_service/\n\u251c\u2500\u2500 __init__.py          # Main entry point\n\u2514\u2500\u2500 entities.py          # Domain sync modules\n\ncartography/models/your_service/\n\u251c\u2500\u2500 entity.py            # Data model definitions\n\u2514\u2500\u2500 tenant.py            # Tenant model\n\ntests/data/your_service/\n\u2514\u2500\u2500 entities.py          # Mock test data\n\ntests/integration/cartography/intel/your_service/\n\u2514\u2500\u2500 test_entities.py     # Integration tests\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_7ea3fab7b1", "name": "### MatchLink Cleanup\n\nAlways ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### MatchLink Cleanup\n\nAlways implement cleanup for MatchLinks:", "active_commits": [5]}, {"id": "Implementation_Impl. Details_2a75d97200", "name": "### MatchLink Pattern\n\n```pyth...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### MatchLink Pattern\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkSchema(CartographyRelSchema):\n    target_node_label: str = \"TargetNode\"\n    target_node_matcher: TargetNodeMatcher = make_target_node_matcher({\n        \"id\": PropertyRef(\"target_id\"),\n    })\n    source_node_label: str = \"SourceNode\"\n    source_node_matcher: SourceNodeMatcher = make_source_node_matcher({\n        \"id\": PropertyRef(\"source_id\"),\n    })\n    direction: LinkDirection = LinkDirection.OUTWARD\n    rel_label: str = \"CONNECTS_TO\"\n    properties: YourMatchLinkRelProperties = YourMatchLinkRelProperties()\n\n# Required properties for MatchLinks\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n# Load and cleanup MatchLinks\nload_matchlinks(neo4j_session, YourMatchLinkSchema(), mapping_data,\n                lastupdated=update_tag, _sub_resource_label=\"AWSAccount\", _sub_resource_id=account_id)\n\nGraphJob.from_matchlink(YourMatchLinkSchema(), \"AWSAccount\", account_id, update_tag).run(neo4j_session)\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_77c265653c", "name": "### One-to-Many Relationship P...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### One-to-Many Relationship Pattern\n\n```python\n# Transform: Create list field\n{\"entity_id\": \"123\", \"related_ids\": [\"a\", \"b\", \"c\"]}\n\n# Schema: Use one_to_many=True\ntarget_node_matcher: TargetNodeMatcher = make_target_node_matcher({\n    \"id\": PropertyRef(\"related_ids\", one_to_many=True),\n})\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_54826045fe", "name": "### Relationship Direction\n\n``...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### Relationship Direction\n\n```python\n# OUTWARD: (:Source)-[:REL]->(:Target)\ndirection: LinkDirection = LinkDirection.OUTWARD\n\n# INWARD: (:Source)<-[:REL]-(:Target)\ndirection: LinkDirection = LinkDirection.INWARD\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_b1c1eb8c33", "name": "### Required MatchLink Propert...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### Required MatchLink Properties\n\nAll MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "active_commits": [5]}, {"id": "Implementation_Impl. Details_938ad66cbc", "name": "### Required Node Properties\n\n...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### Required Node Properties\n\n```python\n@dataclass(frozen=True)\nclass YourNodeProperties(CartographyNodeProperties):\n    id: PropertyRef = PropertyRef(\"id\")                                    # REQUIRED\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)  # REQUIRED\n    # Your business properties here...\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_a4bb0c98ca", "name": "### Standard Load and Cleanup ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### Standard Load and Cleanup Patterns\n\n```python\ndef load_entities(neo4j_session: neo4j.Session, data: list[dict],\n                 tenant_id: str, update_tag: int) -> None:\n    load(neo4j_session, YourSchema(), data,\n         lastupdated=update_tag, TENANT_ID=tenant_id)\n\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    logger.debug(\"Running cleanup job for MyResource\")\n    GraphJob.from_node_schema(YourSchema(), common_job_parameters).run(neo4j_session)\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_3ab1a75d08", "name": "### \ud83d\udeab What NOT to Test\n\n**Do N...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "### \ud83d\udeab What NOT to Test\n\n**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "active_commits": [1, 4, 5, 7, 8]}, {"id": "Implementation_Impl. Details_a7e8dacf3b", "name": "#### 1. Choose the Right Prima...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 1. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`", "active_commits": [4, 8]}, {"id": "Implementation_Impl. Details_0e8ae35ea1", "name": "#### 1. Choose the Right Prima...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 1. Choose the Right Primary Identifier\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems)\n- **Devices**: Use `hostname` as the primary identifier when available", "active_commits": [7]}, {"id": "Implementation_Impl. Details_40d587ea6f", "name": "#### 1. Prefer Semantic Labels...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 1. Prefer Semantic Labels Over Canonical Nodes\n- **\u2705 Use semantic labels** (UserAccount) for new integrations - simpler and more efficient\n- **\u26a0\ufe0f Use canonical nodes** (User/Device) only when you need to aggregate data from multiple sources\n- **Consistent querying**: Semantic labels enable cross-module queries with `_ont_*` properties", "active_commits": [9]}, {"id": "Implementation_Impl. Details_aaec7dffcf", "name": "#### 2. Choose the Right Prima...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`", "active_commits": [9]}, {"id": "Implementation_Impl. Details_880b85dc61", "name": "#### 2. Handle Missing Data Gr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2. Handle Missing Data Gracefully\n```python\n# In your transform function, handle optional ontology fields\ndef transform_users(api_data):\n    return [\n        {\n            \"email\": user[\"email\"],  # Required\n            \"username\": user.get(\"username\"),  # Optional - use .get()\n            \"display_name\": user.get(\"full_name\") or user.get(\"name\"),  # Fallback logic\n            \"first_name\": user.get(\"firstName\"),  # Optional\n            \"last_name\": user.get(\"lastName\"),   # Optional\n        }\n        for user in api_data[\"users\"]\n    ]\n```", "active_commits": [7]}, {"id": "Implementation_Impl. Details_33d8c38721", "name": "#### 2. Use Required Fields St...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing", "active_commits": [4, 8, 9]}, {"id": "Implementation_Impl. Details_a573d5cd95", "name": "#### 2b. Replace load_* Functi...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2b. Replace load_* Functions\nReplace handwritten Cypher in load functions with data model `load()` calls:", "active_commits": [4]}, {"id": "Implementation_Impl. Details_818ff7aef5", "name": "#### 2c. Replace cleanup_* Fun...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2c. Replace cleanup_* Functions\nReplace handwritten cleanup with data model cleanup:", "active_commits": [4]}, {"id": "Implementation_Impl. Details_86667e635b", "name": "#### 2d. Test Continuously\n- R...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 2d. Test Continuously\n- Run your integration test after each change\n- Ensure it still passes - if not, debug before continuing\n- You may need to update minor details in tests due to data model differences", "active_commits": [4, 5]}, {"id": "Implementation_Impl. Details_be64b33736", "name": "#### 3. Handle Missing Data Gr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 3. Handle Missing Data Gracefully\n```python\n# In your transform function, handle optional ontology fields\ndef transform_users(api_data):\n    return [\n        {\n            \"email\": user[\"email\"],  # Required - let it fail if missing\n            \"username\": user.get(\"username\"),  # Optional - use .get()\n            \"display_name\": user.get(\"full_name\") or user.get(\"name\"),  # Fallback logic\n            \"first_name\": user.get(\"firstName\"),  # Optional\n            \"last_name\": user.get(\"lastName\"),   # Optional\n        }\n        for user in api_data[\"users\"]\n    ]\n```", "active_commits": [8]}, {"id": "Implementation_Impl. Details_969dcd7888", "name": "#### 3a. Remove Index Entries\n...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "active_commits": [1, 5, 7, 8]}, {"id": "Implementation_Impl. Details_270c48ef6b", "name": "#### 3b. Remove Cleanup Job Fi...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "active_commits": [1, 5, 7, 8]}, {"id": "Implementation_Impl. Details_ade86bdb7a", "name": "#### 4. Handle Missing Data Gr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "#### 4. Handle Missing Data Gracefully\n```python\n# In your transform function, handle optional ontology fields\ndef transform_users(api_data):\n    return [\n        {\n            \"email\": user[\"email\"],  # Required - let it fail if missing\n            \"username\": user.get(\"username\"),  # Optional - use .get()\n            \"display_name\": user.get(\"full_name\") or user.get(\"name\"),  # Fallback logic\n            \"first_name\": user.get(\"firstName\"),  # Optional\n            \"last_name\": user.get(\"lastName\"),   # Optional\n            \"account_enabled\": user.get(\"enabled\", True),  # Will be inverted to inactive\n        }\n        for user in api_data[\"users\"]\n    ]\n```", "active_commits": [9]}, {"id": "Implementation_Impl. Details_670b39b1a9", "name": "**Before touching any code**, ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Before touching any code**, ensure you have comprehensive test coverage:", "active_commits": [5, 8]}, {"id": "Implementation_Impl. Details_e06004c02a", "name": "**CRITICAL**: Run the test and...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**CRITICAL**: Run the test and ensure it passes before proceeding\n- If the test doesn't exist or fails, fix it first - **no exceptions**", "active_commits": [5, 8]}, {"id": "Implementation_Impl. Details_e2b2194136", "name": "**Composite Node Pattern**: Wh...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "active_commits": [3, 6]}, {"id": "Implementation_Impl. Details_fe69ce85ed", "name": "**DO NOT add custom properties...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "active_commits": [1, 2, 3, 4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_944f2f0e55", "name": "**Default behavior (`scoped_cl...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Default behavior (`scoped_cleanup=True`) is correct for:**\n- User accounts (scoped to organization/tenant)\n- Infrastructure resources (scoped to AWS account, Azure subscription, etc.)\n- Application assets (scoped to company/tenant)", "active_commits": [2, 3]}, {"id": "Implementation_Impl. Details_8316ffa09a", "name": "**Do NOT explicitly test clean...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "active_commits": [9]}, {"id": "Implementation_Impl. Details_34e6bbc627", "name": "**Essential Imports:**\n```pyth...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Essential Imports:**\n```python\nimport logging\nfrom dataclasses import dataclass\nfrom cartography.models.core.common import PropertyRef\nfrom cartography.models.core.nodes import CartographyNodeProperties, CartographyNodeSchema, ExtraNodeLabels\nfrom cartography.models.core.relationships import (\n    CartographyRelProperties, CartographyRelSchema, LinkDirection,\n    make_target_node_matcher, TargetNodeMatcher, OtherRelationships,\n    make_source_node_matcher, SourceNodeMatcher,\n)\nfrom cartography.client.core.tx import load, load_matchlinks\nfrom cartography.graph.job import GraphJob\nfrom cartography.util import timeit\n\nlogger = logging.getLogger(__name__)\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_2a6e31bf45", "name": "**Examples where `scoped_clean...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Examples where `scoped_cleanup=False` makes sense:**\n- Vulnerability databases (CVE data is global)\n- Threat intelligence feeds (IOCs are not tenant-specific)\n- Public certificate transparency logs\n- Global DNS/domain information", "active_commits": [2, 3, 5, 7, 8]}, {"id": "Implementation_Impl. Details_588e0d71b9", "name": "**Fail Loudly**: If an error o...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "active_commits": [6]}, {"id": "Implementation_Impl. Details_fb54dd03f1", "name": "**Key Principles:**\n- **Requir...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Key Principles:**\n- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "active_commits": [5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_57445db2a5", "name": "**Minimal Error Handling**: Av...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "active_commits": [6]}, {"id": "Implementation_Impl. Details_eda61e0c67", "name": "**Note**: Only remove cleanup ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Note**: Only remove cleanup files for modules you've fully converted.", "active_commits": [4]}, {"id": "Implementation_Impl. Details_257f108520", "name": "**Note**: Only remove indexes ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "active_commits": [4]}, {"id": "Implementation_Impl. Details_cf610a50f6", "name": "**Prefer standard node schemas...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Prefer standard node schemas + relationship schemas** whenever possible:", "active_commits": [2, 3, 6]}, {"id": "Implementation_Impl. Details_84bbb1b4a1", "name": "**PropertyRef Parameters:**\n- ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**PropertyRef Parameters:**\n- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "active_commits": [5, 6]}, {"id": "Implementation_Impl. Details_f316671c37", "name": "**PropertyRef Quick Reference:...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**PropertyRef Quick Reference:**\n```python\nPropertyRef(\"field_name\")                          # Value from data dict\nPropertyRef(\"KWARG_NAME\", set_in_kwargs=True)      # Value from load() kwargs\nPropertyRef(\"field\", extra_index=True)             # Create database index\nPropertyRef(\"field_list\", one_to_many=True)        # One-to-many relationships\n```", "active_commits": [0]}, {"id": "Implementation_Impl. Details_7e7fd5a3dc", "name": "**Register rule** in `cartogra...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Register rule** in `cartography/rules/data/rules/__init__.py`:\n\n```python\nfrom cartography.rules.data.rules.my_rule import my_rule\n\nRULES = {\n    # ... existing rules\n    my_rule.id: my_rule,\n}\n```", "active_commits": [6]}, {"id": "Implementation_Impl. Details_6f898a929e", "name": "**Semantic Labels (Recommended...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property", "active_commits": [3, 6, 9]}, {"id": "Implementation_Impl. Details_6f4569b2af", "name": "**Simple Relationship Pattern*...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "active_commits": [3, 6]}, {"id": "Implementation_Impl. Details_182a7e5bab", "name": "**Standard fields for `Cartogr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass\n\n**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "active_commits": [1, 2, 3, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_d5f998fdaf", "name": "**Standard fields for `Cartogr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "active_commits": [2, 3, 5, 7]}, {"id": "Implementation_Impl. Details_bdb6f9c445", "name": "**The Magic**: `one_to_many=Tr...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_a9a8c9a28b", "name": "**Timeout Configuration**: Set...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "active_commits": [6]}, {"id": "Implementation_Impl. Details_8d09c672d5", "name": "**Use Decorators**: For AWS mo...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "active_commits": [6]}, {"id": "Implementation_Impl. Details_1ada8c9efc", "name": "**What to Test:**\n- \u2705 **Outcom...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "active_commits": [4, 5, 8, 9]}, {"id": "Implementation_Impl. Details_d323931e5b", "name": "**When to Mock:**\n- \u2705 External...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "active_commits": [4, 5, 9]}, {"id": "Implementation_Impl. Details_47efa67a59", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**", "active_commits": [3, 6]}, {"id": "Implementation_Impl. Details_283ca4bb7d", "name": "**\u2705 Correct Examples:**\n- **AW...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)", "active_commits": [2]}, {"id": "Implementation_Impl. Details_8909296521", "name": "**\u2705 Use MatchLinks only for:**...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "active_commits": [2, 3]}, {"id": "Implementation_Impl. Details_fcf2c0342c", "name": "**\u274c Don't use MatchLinks for:*...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios", "active_commits": [2, 3, 5, 7]}, {"id": "Implementation_Impl. Details_d1a198fd8f", "name": "**\u274c Incorrect Examples:**\n- Po...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "active_commits": [2, 3]}, {"id": "Implementation_Impl. Details_5251e7b84f", "name": "- **Harmful try/except blocks*...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "active_commits": [1, 3, 4, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_b03926e11a", "name": "- **Required fields**: Use `da...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "active_commits": [1, 2, 3, 4]}, {"id": "Implementation_Impl. Details_630312de79", "name": "- First parameter: Key in your...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "active_commits": [1, 2, 3, 4, 7, 8, 9]}, {"id": "Implementation_Impl. Details_393f26a34b", "name": "- When key assumptions your co...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "active_commits": [1, 3, 4, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_f73b67bb29", "name": "- `LinkDirection.OUTWARD`: `(:...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "- `LinkDirection.OUTWARD`: `(:YourServiceUser)-[:RESOURCE]->(:YourServiceTenant)`\n- `LinkDirection.INWARD`: `(:YourServiceUser)<-[:RESOURCE]-(:YourServiceTenant)`", "active_commits": [2]}, {"id": "Implementation_Impl. Details_c63bf122fd", "name": "1. **Minimal Error Handling**:...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_81abec4342", "name": "2. **Use Decorators**: For AWS...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_505059153f", "name": "3. **Fail Loudly**: If an erro...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_aaefc2f454", "name": "4. **Timeout Configuration**: ...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "active_commits": [1, 2, 3, 4, 5, 7, 8, 9]}, {"id": "Implementation_Impl. Details_3aab6aae08", "name": "Add `UserAccount` label and re...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Add `UserAccount` label and relationship to the canonical `User` node:", "active_commits": [7]}, {"id": "Implementation_Impl. Details_23c03e3053", "name": "Add extra labels like \"Identit...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Add extra labels like \"Identity\" and \"Asset\" to the node\n    extra_node_labels: ExtraNodeLabels = ExtraNodeLabels([\"Identity\", \"Asset\"])", "active_commits": [2]}, {"id": "Implementation_Impl. Details_d020ac3f57", "name": "Add fields to `cartography/con...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Add fields to `cartography/config.py`:", "active_commits": [2]}, {"id": "Implementation_Impl. Details_cfde5141cd", "name": "Add ontology integration to yo...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Add ontology integration to your module when it manages:\n- **Users/Identities**: Service accounts, human users, admin accounts\n- **Devices/Assets**: Computers, phones, tablets, IoT devices, virtual machines", "active_commits": [7]}, {"id": "Implementation_Impl. Details_3b43115c8e", "name": "Add your configuration options...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Add your configuration options in `cartography/cli.py`:", "active_commits": [2]}, {"id": "Implementation_Impl. Details_9fe0a4869b", "name": "All MatchLink relationship pro...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "active_commits": [1, 2, 3, 4, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_7bcbbaa3c2", "name": "Always document your schema in...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "active_commits": [1, 2, 3, 4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_0db40a36ac", "name": "Always implement cleanup for M...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Always implement cleanup for MatchLinks:", "active_commits": [1, 2, 3, 4, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_66843b31e0", "name": "Always implement cleanup to re...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Always implement cleanup to remove stale data:", "active_commits": [2]}, {"id": "Implementation_Impl. Details_24f3672c9a", "name": "Always validate your configura...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Always validate your configuration:", "active_commits": [2, 3]}, {"id": "Implementation_Impl. Details_c54a8e954b", "name": "Always validate your configura...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```", "active_commits": [4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_9014089ddd", "name": "Every sync function follows th...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "active_commits": [4, 5, 6, 7]}, {"id": "Implementation_Impl. Details_10acba4ba5", "name": "If you need conditional behavi...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "active_commits": [1, 2, 3, 4, 5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_f235860baa", "name": "It is possible (and encouraged...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "It is possible (and encouraged) for more than one intel module to modify the same node type.", "active_commits": [2]}, {"id": "Implementation_Impl. Details_5d0693b078", "name": "Neo4j 4+ supports native Pytho...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:", "active_commits": [1, 2, 3, 4, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_562b7b560b", "name": "Note though that if a field is...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Note though that if a field is referred to in a target node matcher, it will be indexed automatically.", "active_commits": [5]}, {"id": "Implementation_Impl. Details_b1c5d2e761", "name": "Set `scoped_cleanup=False` **O...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "active_commits": [1, 2, 3, 5, 6, 7, 8, 9]}, {"id": "Implementation_Impl. Details_7a517ba65b", "name": "The `eligible_for_source` para...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "active_commits": [1, 3, 4, 6, 9]}, {"id": "Implementation_Impl. Details_a94734e2a3", "name": "The `get` function should be \"...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "The `get` function should be \"dumb\" - just fetch data and raise exceptions on failure:", "active_commits": [2, 5]}, {"id": "Implementation_Impl. Details_090a591d3c", "name": "The `required` parameter in `O...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "active_commits": [1, 3, 4, 6, 8, 9]}, {"id": "Implementation_Impl. Details_0e3d62e2ee", "name": "The `sub_resource_relationship...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "active_commits": [3, 6]}, {"id": "Implementation_Impl. Details_13e20c4525", "name": "The key distinction is whether...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "active_commits": [3]}, {"id": "Implementation_Impl. Details_57a388ca75", "name": "This creates nodes with multip...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "This creates nodes with multiple labels: `(:YourServiceUser:Identity:Asset)`.", "active_commits": [2]}, {"id": "Implementation_Impl. Details_0910b2242b", "name": "Transform data to make it easi...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Transform data to make it easier to ingest. Handle required vs optional fields carefully:", "active_commits": [2]}, {"id": "Implementation_Impl. Details_c56dd93d06", "name": "Unit tests are only for testin...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Unit tests are only for testing smaller functions and verifying that the outputs are as expected.", "active_commits": [5, 8, 9]}, {"id": "Implementation_Impl. Details_472aee7376", "name": "Use Python 3.9+ style type hin...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Use Python 3.9+ style type hints throughout your code:", "active_commits": [3, 4, 6, 7]}, {"id": "Implementation_Impl. Details_59493f49ea", "name": "Use the `load` function with y...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "Use the `load` function with your schema:", "active_commits": [2]}, {"id": "Implementation_Impl. Details_3a332109b4", "name": "`one_to_many=True` tells Carto...", "category": "Implementation", "label": "Impl. Details", "cat_color": "#984EA3", "raw_text": "`one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "active_commits": [6]}, {"id": "Management_Development Process_7a9b14e073", "name": "## \ud83c\udfaf Final Checklist\n\nBefore s...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "## \ud83c\udfaf Final Checklist\n\nBefore submitting your module:\n\n- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields\n- [ ] \u2705 **Testing**: Integration tests for sync functions\n- [ ] \u2705 **Documentation**: Schema docs, docstrings, inline comments\n- [ ] \u2705 **Cleanup**: Proper cleanup job implementation\n- [ ] \u2705 **Indexing**: Extra indexes on frequently queried fields", "active_commits": [4]}, {"id": "Management_Development Process_b589d4169a", "name": "### \ud83c\udfaf Success Criteria\n\nA succ...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "### \ud83c\udfaf Success Criteria\n\nA successful refactor should:\n1. **Preserve all functionality** - tests pass\n2. **Use data model** - no handwritten Cypher for CRUD operations\n3. **Clean up legacy files** - indexes and cleanup jobs removed\n4. **Maintain performance** - no significant speed degradation\n5. **Follow patterns** - consistent with other modern modules", "active_commits": [4, 5]}, {"id": "Management_Development Process_635f7167f0", "name": "### \ud83d\udccb Refactoring Checklist\n\nB...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "### \ud83d\udccb Refactoring Checklist\n\nBefore submitting a refactor:\n\n- [ ] \u2705 **Integration test exists and passes** for the sync function\n- [ ] \u2705 **Data model schemas** defined with proper relationships\n- [ ] \u2705 **Legacy load functions** converted to use `load()`\n- [ ] \u2705 **Legacy cleanup functions** converted to use `GraphJob.from_node_schema()`\n- [ ] \u2705 **Tests still pass** after all changes\n- [ ] \u2705 **Index entries removed** from `indexes.cypher`\n- [ ] \u2705 **Cleanup JSON files removed** from cleanup directory\n- [ ] \u2705 **No regressions** - all functionality preserved", "active_commits": [4]}, {"id": "Management_Development Process_5b07895f31", "name": "**Pull Request Descriptions**:...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "**Pull Request Descriptions**: When creating a pull request, use the template at `.github/pull_request_template.md`.", "active_commits": [0, 3, 6]}, {"id": "Management_Development Process_2b6455fbcd", "name": "**Signing Commits**: All commi...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "**Signing Commits**: All commits must be signed using the `-s` flag. This adds a `Signed-off-by` line to your commit message, certifying that you have the right to submit the code under the project's license.", "active_commits": [0, 3, 6]}, {"id": "Management_Development Process_e7a47bb487", "name": "- [ ] \u2705 **Configuration**: CLI...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields\n- [ ] \u2705 **Testing**: Integration tests for sync functions\n- [ ] \u2705 **Documentation**: Schema docs, docstrings, inline comments\n- [ ] \u2705 **Cleanup**: Proper cleanup job implementation\n- [ ] \u2705 **Indexing**: Extra indexes on frequently queried fields", "active_commits": [8]}, {"id": "Management_Development Process_f5b74e5394", "name": "- [ ] \u2705 **Run your integration...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "- [ ] \u2705 **Run your integration test after each change**\n- Ensure it still passes - if not, debug before continuing\n- You may need to update minor details in tests due to data model differences", "active_commits": [9]}, {"id": "Management_Development Process_41703fe6f1", "name": "A successful refactor should:\n...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "A successful refactor should:\n1. **Preserve all functionality** - tests pass\n2. **Use data model** - no handwritten Cypher for CRUD operations\n3. **Clean up legacy files** - indexes and cleanup jobs removed\n4. **Maintain performance** - no significant speed degradation\n5. **Follow patterns** - consistent with other modern modules", "active_commits": [8]}, {"id": "Management_Development Process_25f75b9844", "name": "Before submitting a refactor:\n...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Before submitting a refactor:\n\n- [ ] \u2705 **Integration test exists and passes** for the sync function\n- [ ] \u2705 **Data model schemas** defined with proper relationships\n- [ ] \u2705 **Legacy load functions** converted to use `load()`\n- [ ] \u2705 **Legacy cleanup functions** converted to use `GraphJob.from_node_schema()`\n- [ ] \u2705 **Tests still pass** after all changes\n- [ ] \u2705 **Index entries removed** from `indexes.cypher`\n- [ ] \u2705 **Cleanup JSON files removed** from cleanup directory\n- [ ] \u2705 **No regressions** - all functionality preserved", "active_commits": [5]}, {"id": "Management_Development Process_716d1b9a5d", "name": "Before submitting your module:...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Before submitting your module:\n\n- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields\n- [ ] \u2705 **Testing**: Integration tests for sync functions\n- [ ] \u2705 **Documentation**: Schema docs, docstrings, inline comments\n- [ ] \u2705 **Cleanup**: Proper cleanup job implementation\n- [ ] \u2705 **Indexing**: Extra indexes on frequently queried fields", "active_commits": [5]}, {"id": "Management_Development Process_25766284f4", "name": "Ensure your mappings are impor...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Ensure your mappings are imported and available to the ontology system:", "active_commits": [8]}, {"id": "Management_Development Process_d5e855ae4e", "name": "Every Cartography intel module...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Every Cartography intel module follows this structure:\n\n```\ncartography/intel/your_module/\n\u251c\u2500\u2500 __init__.py          # Main entry point with sync orchestration\n\u251c\u2500\u2500 users.py             # Domain-specific sync modules (users, devices, etc.)\n\u251c\u2500\u2500 devices.py           # Additional domain modules as needed\n\u2514\u2500\u2500 ...\n\ncartography/models/your_module/\n\u251c\u2500\u2500 user.py              # Data model definitions\n\u251c\u2500\u2500 tenant.py            # Tenant/account model\n\u2514\u2500\u2500 ...\n```", "active_commits": [6]}, {"id": "Management_Development Process_9014089ddd", "name": "Every sync function follows th...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "active_commits": [1, 3]}, {"id": "Management_Development Process_d275530626", "name": "Remember: Start simple, iterat...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Remember: Start simple, iterate, and use existing modules as references. The Cartography community is here to help! \ud83d\ude80", "active_commits": [2]}, {"id": "Management_Development Process_e6a2ac0a7b", "name": "The fastest way to get started...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "The fastest way to get started is to copy the structure from an existing module:\n\n- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "active_commits": [1, 2, 5, 8, 9]}, {"id": "Management_Development Process_472aee7376", "name": "Use Python 3.9+ style type hin...", "category": "Management", "label": "Development Process", "cat_color": "#FF7F00", "raw_text": "Use Python 3.9+ style type hints throughout your code:", "active_commits": [1, 2, 9]}, {"id": "Quality_Debugging_9def7439a5", "name": "#### Data Transform Issues\n```...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "#### Data Transform Issues\n```python\n# \u274c Problem: KeyError during transform\n# \u2705 Solution: Handle required vs optional fields correctly\n{\n    \"id\": data[\"id\"],                    # Required - let it fail\n    \"name\": data.get(\"name\"),            # Optional - use .get()\n    \"email\": data.get(\"email\", \"\"),      # \u274c Don't use empty string default\n    \"email\": data.get(\"email\"),          # \u2705 Use None default\n}\n```", "active_commits": [1]}, {"id": "Quality_Debugging_3e12c819dd", "name": "#### Import Errors\n```python\n#...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "#### Import Errors\n```python\n# \u274c Problem: ModuleNotFoundError for your new module\n# \u2705 Solution: Ensure __init__.py files exist in all directories\ncartography/intel/your_service/__init__.py\ncartography/models/your_service/__init__.py\n```", "active_commits": [1]}, {"id": "Quality_Debugging_eb09b8f84e", "name": "#### Performance Issues\n```pyt...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "#### Performance Issues\n```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n\nNote though that if a field is referred to in a target node matcher, it will be indexed automatically.\n```", "active_commits": [1]}, {"id": "Quality_Debugging_f8607b1fc0", "name": "#### Relationship Connection I...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "#### Relationship Connection Issues\n```python\n# \u274c Problem: Relationships not created\n# \u2705 Solution: Ensure target nodes exist before creating relationships\n# Load parent nodes first:\nload(neo4j_session, TenantSchema(), tenant_data, lastupdated=update_tag)\n# Then load child nodes with relationships:\nload(neo4j_session, UserSchema(), user_data, lastupdated=update_tag, TENANT_ID=tenant_id)\n```", "active_commits": [1]}, {"id": "Quality_Debugging_c40376fe54", "name": "**Issue**: Cross-module querie...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Cross-module queries not working\n**Solution**: Ensure that:\n- Multiple modules have `UserAccount` labels on their user nodes\n- Each module has ontology mappings that use consistent `ontology_field` names\n- Nodes have `_ont_*` properties populated (check that mappings are registered correctly)\n- Use `_ont_*` properties in your queries, not the original source field names", "active_commits": [9]}, {"id": "Quality_Debugging_5fe8bada01", "name": "**Issue**: Fewer ontology node...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Fewer ontology nodes created than expected\n**Solution**: Check if:\n- **Required fields are missing**: Source nodes lacking required fields are filtered out completely\n- Required fields are marked appropriately (primary identifiers should be required)\n- Your source data has the expected completeness", "active_commits": [8]}, {"id": "Quality_Debugging_5ac01aabe9", "name": "**Issue**: Fewer ontology node...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Fewer ontology nodes/properties created than expected\n**Solution**: Check if:\n- **Required fields are missing**: Source nodes lacking required fields are filtered out completely\n- Required fields are marked appropriately (primary identifiers should be required)\n- **Node eligibility**: Verify `eligible_for_source=True` for mappings that should create new ontology nodes\n- Your source data has the expected completeness\n- Field names match exactly between mapping and node properties", "active_commits": [9]}, {"id": "Quality_Debugging_d600dfb93e", "name": "**Issue**: Ontology nodes not ...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Ontology nodes not created\n**Solution**: Verify that:\n- Your mapping is registered in `ALL_USER_MAPPINGS` or `ALL_DEVICE_MAPPINGS`\n- Your source nodes have the correct labels (`UserAccount` for users)\n- Field mappings match your actual node properties\n- **Check required fields**: Ensure source nodes have all required fields populated (not `None`)", "active_commits": [8]}, {"id": "Quality_Debugging_2e1c8c081a", "name": "**Issue**: Ontology properties...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Ontology properties (`_ont_*`) not added to nodes\n**Solution**: Verify that:\n- Your mapping is registered in `USERACCOUNTS_ONTOLOGY_MAPPING` (for semantic labels) or `USERS_ONTOLOGY_MAPPING`/`DEVICES_ONTOLOGY_MAPPING` (for canonical nodes)\n- Your source nodes have the correct labels (`UserAccount` for users)\n- Field mappings match your actual node properties exactly\n- The ontology mapping module name matches your intel module name", "active_commits": [9]}, {"id": "Quality_Debugging_4722cfc7da", "name": "**Issue**: Special handling no...", "category": "Quality", "label": "Debugging", "cat_color": "#4DAF4A", "raw_text": "**Issue**: Special handling not working correctly\n**Solution**: Check that:\n- `special_handling` value is one of: `invert_boolean`, `to_boolean`, `or_boolean`, `equal_boolean`\n- For `or_boolean`: `extra[\"fields\"]` contains valid field names that exist in your node properties\n- For `equal_boolean`: `extra[\
