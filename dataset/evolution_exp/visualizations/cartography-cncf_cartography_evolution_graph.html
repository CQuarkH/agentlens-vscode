imeout Configuration**: Set appropriate timeouts to avoid hanging:", "details": "\n            4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 142 - 142<br><strong>ID:</strong> rule_18\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_cda1b18ad0", "name": "**Key Principles:**\n- **Requir...", "group": "rule", "color": "#984ea3", "raw_text": "**Key Principles:**\n- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "details": "\n            **Key Principles:**\n- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> TRANSFORM: Shaping Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 163 - 166<br><strong>ID:</strong> rule_19\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#984ea3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "details": "\n            - First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Properties<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 196 - 198<br><strong>ID:</strong> rule_20\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "details": "\n            **DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 316 - 317<br><strong>ID:</strong> rule_21\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_32a83c96ee", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass\n\n**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "details": "\n            **Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass\n\n**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 352 - 365<br><strong>ID:</strong> rule_22\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "details": "\n            If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 367 - 367<br><strong>ID:</strong> rule_23\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_43e92044df", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#984ea3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "details": "\n            All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required MatchLink Properties<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 441 - 453<br><strong>ID:</strong> rule_24\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#984ea3", "raw_text": "Always implement cleanup for MatchLinks:", "details": "\n            Always implement cleanup for MatchLinks:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> MatchLink Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 456 - 456<br><strong>ID:</strong> rule_25\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_028ce0bb90", "name": "**Semantic Labels (Recommended...", "group": "rule", "color": "#984ea3", "raw_text": "**Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property\n\n**Canonical Nodes (Legacy)**: Creates separate abstract `User`/`Device` nodes:\n- \u26a0\ufe0f More complex - requires separate node creation and relationship management\n- \u26a0\ufe0f Additional storage overhead\n- \u2705 Useful when you need to aggregate data from multiple sources into single entities", "details": "\n            **Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property\n\n**Canonical Nodes (Legacy)**: Creates separate abstract `User`/`Device` nodes:\n- \u26a0\ufe0f More complex - requires separate node creation and relationship management\n- \u26a0\ufe0f Additional storage overhead\n- \u2705 Useful when you need to aggregate data from multiple sources into single entities<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Types of Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 479 - 488<br><strong>ID:</strong> rule_26\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5ee467071", "name": "The `required` parameter in `O...", "group": "rule", "color": "#984ea3", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "details": "\n            The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required Fields<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 582 - 588<br><strong>ID:</strong> rule_27\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_feb8f788a7", "name": "The `eligible_for_source` para...", "group": "rule", "color": "#984ea3", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "details": "\n            The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Eligibility<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 597 - 603<br><strong>ID:</strong> rule_28\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e07e6e237", "name": "#### 1. Prefer Semantic Labels...", "group": "rule", "color": "#984ea3", "raw_text": "#### 1. Prefer Semantic Labels Over Canonical Nodes\n- **\u2705 Use semantic labels** (UserAccount) for new integrations - simpler and more efficient\n- **\u26a0\ufe0f Use canonical nodes** (User/Device) only when you need to aggregate data from multiple sources\n- **Consistent querying**: Semantic labels enable cross-module queries with `_ont_*` properties", "details": "\n            #### 1. Prefer Semantic Labels Over Canonical Nodes\n- **\u2705 Use semantic labels** (UserAccount) for new integrations - simpler and more efficient\n- **\u26a0\ufe0f Use canonical nodes** (User/Device) only when you need to aggregate data from multiple sources\n- **Consistent querying**: Semantic labels enable cross-module queries with `_ont_*` properties<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 672 - 675<br><strong>ID:</strong> rule_29\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_e4dbab1afd", "name": "#### 2. Choose the Right Prima...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`", "details": "\n            #### 2. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 677 - 679<br><strong>ID:</strong> rule_30\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6b95b26dc6", "name": "#### 2. Use Required Fields St...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing", "details": "\n            #### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 685 - 688<br><strong>ID:</strong> rule_31\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_0eec1dc259", "name": "#### 4. Handle Missing Data Gr...", "group": "rule", "color": "#984ea3", "raw_text": "#### 4. Handle Missing Data Gracefully\n```python\n# In your transform function, handle optional ontology fields\ndef transform_users(api_data):\n    return [\n        {\n            \"email\": user[\"email\"],  # Required - let it fail if missing\n            \"username\": user.get(\"username\"),  # Optional - use .get()\n            \"display_name\": user.get(\"full_name\") or user.get(\"name\"),  # Fallback logic\n            \"first_name\": user.get(\"firstName\"),  # Optional\n            \"last_name\": user.get(\"lastName\"),   # Optional\n            \"account_enabled\": user.get(\"enabled\", True),  # Will be inverted to inactive\n        }\n        for user in api_data[\"users\"]\n    ]\n```", "details": "\n            #### 4. Handle Missing Data Gracefully\n```python\n# In your transform function, handle optional ontology fields\ndef transform_users(api_data):\n    return [\n        {\n            \"email\": user[\"email\"],  # Required - let it fail if missing\n            \"username\": user.get(\"username\"),  # Optional - use .get()\n            \"display_name\": user.get(\"full_name\") or user.get(\"name\"),  # Fallback logic\n            \"first_name\": user.get(\"firstName\"),  # Optional\n            \"last_name\": user.get(\"lastName\"),   # Optional\n            \"account_enabled\": user.get(\"enabled\", True),  # Will be inverted to inactive\n        }\n        for user in api_data[\"users\"]\n    ]\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 706 - 721<br><strong>ID:</strong> rule_32\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_610d6ab52b", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```", "details": "\n            Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Validation in Module<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 762 - 780<br><strong>ID:</strong> rule_33\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ab37f5bf96", "name": "- When key assumptions your co...", "group": "rule", "color": "#984ea3", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "details": "\n            - When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 786 - 798<br><strong>ID:</strong> rule_34\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6183e7134c", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#984ea3", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "details": "\n            - **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 802 - 807<br><strong>ID:</strong> rule_35\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba072382e3", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#984ea3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:\n\n```python\n# \u274c DON'T: Manually parse dates or convert to epoch timestamps\n\"created_at\": int(dt_parse.parse(user_data[\"created_at\"]).timestamp() * 1000)\n\"last_login\": dict_date_to_epoch({\"d\": dt_parse.parse(data[\"last_login\"])}, \"d\")\n\n# \u2705 DO: Pass datetime values directly\n\"created_at\": user_data.get(\"created_at\")  # AWS/API returns ISO 8601 dates\n\"last_login\": user_data.get(\"last_login\")  # Neo4j handles these natively\n```", "details": "\n            Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:\n\n```python\n# \u274c DON'T: Manually parse dates or convert to epoch timestamps\n\"created_at\": int(dt_parse.parse(user_data[\"created_at\"]).timestamp() * 1000)\n\"last_login\": dict_date_to_epoch({\"d\": dt_parse.parse(data[\"last_login\"])}, \"d\")\n\n# \u2705 DO: Pass datetime values directly\n\"created_at\": user_data.get(\"created_at\")  # AWS/API returns ISO 8601 dates\n\"last_login\": user_data.get(\"last_login\")  # Neo4j handles these natively\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Date Handling<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 826 - 836<br><strong>ID:</strong> rule_36\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_451fea0416", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#984ea3", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "details": "\n            **What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 556 - 563<br><strong>ID:</strong> rule_37\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_36de71c72a", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#984ea3", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "details": "\n            **When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 565 - 573<br><strong>ID:</strong> rule_38\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_07d018e4de", "name": "**Do NOT explicitly test clean...", "group": "rule", "color": "#984ea3", "raw_text": "**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "details": "\n            **Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udeab What NOT to Test<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 752 - 755<br><strong>ID:</strong> rule_39\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#984ea3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "details": "\n            Alw up.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "details": "\n            Remove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> 3b. Remove Cleanup Job Files<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 741 - 748<br><strong>ID:</strong> rule_55\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Maintenance_e5f2b49916", "name": "Always implement cleanup to re...", "group": "rule", "color": "#77c474", "raw_text": "Always implement cleanup to remove stale data:\n\n```python\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    \"\"\"\n    Remove nodes that weren't updated in this sync run\n    \"\"\"\n    logger.debug(\"Running Your Service cleanup job\")\n\n    # Cleanup users\n    GraphJob.from_node_schema(YourServiceUserSchema(), common_job_parameters).run(neo4j_session)\n```", "details": "\n            Always implement cleanup to remove stale data:\n\n```python\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    \"\"\"\n    Remove nodes that weren't updated in this sync run\n    \"\"\"\n    logger.debug(\"Running Your Service cleanup job\")\n\n    # Cleanup users\n    GraphJob.from_node_schema(YourServiceUserSchema(), common_job_parameters).run(neo4j_session)\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Cleanup Jobs<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 806 - 817<br><strong>ID:</strong> rule_56\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Quality_Debugging", "name": "Debugging", "group": "label", "color": "#4daf4a", "details": "Label: Debugging<br>Total Rules: 4<br>Code Ratio: 1.0<br>FRE Cognitive Load: 0.0", "children": [{"id": "rule_Quality_Debugging_6194f75c8e", "name": "**Issue**: Ontology properties...", "group": "rule", "color": "#4daf4a", "raw_text": "**Issue**: Ontology properties (`_ont_*`) not added to nodes\n**Solution**: Verify that:\n- Your mapping is registered in `USERACCOUNTS_ONTOLOGY_MAPPING` (for semantic labels) or `USERS_ONTOLOGY_MAPPING`/`DEVICES_ONTOLOGY_MAPPING` (for canonical nodes)\n- Your source nodes have the correct labels (`UserAccount` for users)\n- Field mappings match your actual node properties exactly\n- The ontology mapping module name matches your intel module name", "details": "\n            **Issue**: Ontology properties (`_ont_*`) not added to nodes\n**Solution**: Verify that:\n- Your mapping is registered in `USERACCOUNTS_ONTOLOGY_MAPPING` (for semantic labels) or `USERS_ONTOLOGY_MAPPING`/`DEVICES_ONTOLOGY_MAPPING` (for canonical nodes)\n- Your source nodes have the correct labels (`UserAccount` for users)\n- Field mappings match your actual node properties exactly\n- The ontology mapping module name matches your intel module name<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Common Issues<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 730 - 735<br><strong>ID:</strong> rule_57\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Debugging_c71a2b6e6a", "name": "**Issue**: Special handling no...", "group": "rule", "color": "#4daf4a", "raw_text": "**Issue**: Special handling not working correctly\n**Solution**: Check that:\n- `special_handling` value is one of: `invert_boolean`, `to_boolean`, `or_boolean`, `equal_boolean`\n- For `or_boolean`: `extra[\"fields\"]` contains valid field names that exist in your node properties\n- For `equal_boolean`: `extra[\"values\"]` is a list of values to compare against\n- Field names in `extra[\"fields\"]` match exactly what's in your node schema", "details": "\n            **Issue**: Special handling not working correctly\n**Solution**: Check that:\n- `special_handling` value is one of: `invert_boolean`, `to_boolean`, `or_boolean`, `equal_boolean`\n- For `or_boolean`: `extra[\"fields\"]` contains valid field names that exist in your node properties\n- For `equal_boolean`: `extra[\"values\"]` is a list of values to compare against\n- Field names in `extra[\"fields\"]` match exactly what's in your node schema<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Common Issues<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 737 - 742<br><strong>ID:</strong> rule_58\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Debugging_757c685909", "name": "**Issue**: Fewer ontology node...", "group": "rule", "color": "#4daf4a", "raw_text": "**Issue**: Fewer ontology nodes/properties created than expected\n**Solution**: Check if:\n- **Required fields are missing**: Source nodes lacking required fields are filtered out completely\n- Required fields are marked appropriately (primary identifiers should be required)\n- **Node eligibility**: Verify `eligible_for_source=True` for mappings that should create new ontology nodes\n- Your source data has the expected completeness\n- Field names match exactly between mapping and node properties", "details": "\n            **Issue**: Fewer ontology nodes/properties created than expected\n**Solution**: Check if:\n- **Required fields are missing**: Source nodes lacking required fields are filtered out completely\n- Required fields are marked appropriately (primary identifiers should be required)\n- **Node eligibility**: Verify `eligible_for_source=True` for mappings that should create new ontology nodes\n- Your source data has the expected completeness\n- Field names match exactly between mapping and node properties<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Common Issues<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 754 - 760<br><strong>ID:</strong> rule_59\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Debugging_bdb4ee16de", "name": "**Issue**: Cross-module querie...", "group": "rule", "color": "#4daf4a", "raw_text": "**Issue**: Cross-module queries not working\n**Solution**: Ensure that:\n- Multiple modules have `UserAccount` labels on their user nodes\n- Each module has ontology mappings that use consistent `ontology_field` names\n- Nodes have `_ont_*` properties populated (check that mappings are registered correctly)\n- Use `_ont_*` properties in your queries, not the original source field names", "details": "\n            **Issue**: Cross-module queries not working\n**Solution**: Ensure that:\n- Multiple modules have `UserAccount` labels on their user nodes\n- Each module has ontology mappings that use consistent `ontology_field` names\n- Nodes have `_ont_*` properties populated (check that mappings are registered correctly)\n- Use `_ont_*` properties in your queries, not the original source field names<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Common Issues<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 770 - 775<br><strong>ID:</strong> rule_60\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Quality_Performance", "name": "Performance", "group": "label", "color": "#bce2bb", "details": "Label: Performance<br>Total Rules: 2<br>Code Ratio: 0.5<br>FRE Cognitive Load: 64.2", "children": [{"id": "rule_Quality_Performance_699d1f526d", "name": "MatchLinks have significant pe...", "group": "rule", "color": "#bce2bb", "raw_text": "MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph", "details": "\n            MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Performance Impact<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 409 - 415<br><strong>ID:</strong> rule_61\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Performance_0e2fdfbd5d", "name": "```python\n# \u274c Problem: Slow qu...", "group": "rule", "color": "#bce2bb", "raw_text": "```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n\nNote though that if a field is referred to in a target node matcher, it will be indexed automatically.\n```", "details": "\n            ```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n\nNote though that if a field is referred to in a target node matcher, it will be indexed automatically.\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Performance Issues<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 882 - 891<br><strong>ID:</strong> rule_62\n            </small>\n            ", "width": 231}]}]}]}, "index": 9}];
        const totalCommits = commitsData.length;
        
        const svgPlay = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>';
        const svgPause = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';

        const slider = document.getElementById("timeline-slider");
        slider.max = totalCommits - 1;
        const playBtn = document.getElementById("play-btn");
        const shaDisplay = document.getElementById("commit-sha");
        const stepLabel = document.getElementById("current-step-label");
        const statsDisplay = document.getElementById("header-stats");

        const ticksContainer = document.getElementById("slider-ticks");
        for (let j = 0; j < totalCommits; j++) {
            let dot = document.createElement("div");
            dot.className = "tick";
            ticksContainer.appendChild(dot);
        }

        const container = document.getElementById("graph-container");
        let width = container.clientWidth;
        let height = container.clientHeight;

        const svg = d3.select("#graph-container").append("svg")
            .attr("width", width)
            .attr("height", height);
            
        const g = svg.append("g");
        
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        svg.on("click", () => {
            document.getElementById("details-panel").style.display = "none";
        });

        const dx = 45;  
        const dy = 350; 
        const treeLayout = d3.tree().nodeSize([dx, dy]);
        
        g.append("g").attr("class", "links");
        g.append("g").attr("class", "nodes");
        
        let currentIds = new Set();
        let activeFocus = null;
        let collapsedNodes = new Set(); // Estado de los nodos colapsados

        function applyFocus(tree, focus) {
            if (!focus) return tree;
            const filtered = Object.assign({}, tree, {children: []});
            if (focus.type === 'category') {
                const cat = (tree.children || []).find(c => c.name === focus.name);
                if (cat) filtered.children = [cat];
            } else if (focus.type === 'label') {
                const cat = (tree.children || []).find(c => c.name === focus.catName);
                if (cat) {
                    const lbl = (cat.children || []).find(l => l.name === focus.labelName);
                    if (lbl) filtered.children = [Object.assign({}, cat, {children: [lbl]})];
                }
            }
            return filtered;
        }

        function updateFocusIndicator() {
            const el = document.getElementById('focus-indicator');
            const labelEl = document.getElementById('focus-label');
            if (!activeFocus) {
                el.style.display = 'none';
            } else if (activeFocus.type === 'category') {
                el.style.display = 'flex';
                labelEl.innerHTML = 'Category: <strong id="focus-name">' + activeFocus.name + '</strong>';
            } else if (activeFocus.type === 'label') {
                el.style.display = 'flex';
                labelEl.innerHTML = 'Label: <strong id="focus-name">' + activeFocus.catName + ' › ' + activeFocus.labelName + '</strong>';
            }
        }

        function clearFocus() {
            activeFocus = null;
            updateFocusIndicator();
            updateGraph(parseInt(slider.value));
        }

        function showDetails(nodeData) {
            const panel = document.getElementById("details-panel");
            const content = document.getElementById("details-content");
            let html = `<strong>Type: ${nodeData.group.toUpperCase()}</strong><br>`;
            if (nodeData.details) {
                html += `<div style="margin-top:10px;">${nodeData.details}</div>`;
            }
            if (nodeData.raw_text) {
                html += `<hr style="border:0; border-top:1px solid #e2e8f0; margin:15px 0;">
                         <strong>Raw Content:</strong>
                         <pre style="white-space:pre-wrap; font-family:monospace; font-size:0.85rem; background:#f8fafc; padding:10px; border-radius:6px; border:1px solid #e2e8f0;">${nodeData.raw_text}</pre>`;
            }
            content.innerHTML = html;
            panel.style.display = "block";
        }

        function autoFitGraph(nodes) {
            if (!document.getElementById("auto-fit-toggle").checked) return;
            if (!nodes || nodes.length === 0) return;

            let minX = Infinity, maxX = -Infinity; 
            let minY = Infinity, maxY = -Infinity; 

            nodes.forEach(n => {
                if (n.x < minX) minX = n.x;
                if (n.x > maxX) maxX = n.x;
                if (n.y < minY) minY = n.y;
                const nodeW = n.data.width || 200;
                if (n.y + nodeW > maxY) maxY = n.y + nodeW;
            });

            const padding = 60;
            const treeHeight = (maxX - minX) + padding * 2; 
            const treeWidth = (maxY - minY) + padding * 2;  

            const availableW = width;
            const availableH = height - 120; 

            const scaleX = availableW / (treeWidth || 1);
            const scaleY = availableH / (treeHeight || 1);
            const scale = Math.min(scaleX, scaleY, 1.1); 

            const centerX = minY + (maxY - minY) / 2;
            const centerY = minX + (maxX - minX) / 2;

            const tx = availableW / 2 - centerX * scale;
            const ty = (availableH / 2) - centerY * scale + 20;

            svg.transition().duration(800)
               .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        }

        function updateGraph(index) {
            const commitInfo = commitsData[index];
            shaDisplay.innerText = commitInfo.commit.substring(0, 8);
            stepLabel.innerText = `Commit ${index + 1} of ${totalCommits}`;
            
            const allTicks = document.querySelectorAll('.tick');
            allTicks.forEach((t, idx) => {
                if (idx <= index) t.classList.add('active');
                else t.classList.remove('active');
            });

            const rawData = commitInfo.tree;
            const rootData = applyFocus(rawData, activeFocus);
            const root = d3.hierarchy(rootData);
            
            // Lógica para aplicar el estado de colapso antes de calcular el layout
            root.each(d => {
                if (collapsedNodes.has(d.data.id) && d.children) {
                    d._children = d.children;
                    d.children = null;
                }
            });

            root.sort((a, b) => a.data.name.localeCompare(b.data.name));
            treeLayout(root);

            const nodes = root.descendants();
            const links = root.links();
            
            const numRules = nodes.filter(n => n.data.group === 'rule').length;
            statsDisplay.innerHTML = `
                <span class="stat-badge">Visible Nodes: ${nodes.length - 1}</span> 
                <span class="stat-badge">Visible Rules: ${numRules}</span>
            `;

            autoFitGraph(nodes);

            const newIds = new Set(nodes.map(d => d.data.id));
            const addedIds = new Set([...newIds].filter(x => !currentIds.has(x) && index > 0));
            currentIds = newIds;

            // --- LINKS ---
            const link = g.select(".links").selectAll("path.link")
                .data(links, d => d.target.data.id);
                
            const linkEnter = link.enter().append("path")
                .attr("class", "link")
                .attr("d", d => {
                    const o = {x: d.source.x, y: d.source.y};
                    return d3.linkHorizontal().x(d => d.y).y(d => d.x)({source: o, target: o});
                })
                .style("opacity", 0);
                
            link.merge(linkEnter).transition().duration(800)
                .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x))
                .style("opacity", 1);
                
            link.exit().transition().duration(500)
                .style("opacity", 0)
                .remove();

            // --- NODES ---
            const node = g.select(".nodes").selectAll("g.node")
                .data(nodes, d => d.data.id);
                
            const nodeEnter = node.enter().append("g")
                .attr("class", "node")
                .attr("transform", d => `translate(${d.parent ? d.parent.y : d.y},${d.parent ? d.parent.x : d.x})`)
                .style("opacity", 0);
                
            nodeEnter.filter(d => d.data.group !== "root").append("rect")
                .attr("class", "main-rect")
                .attr("width", d => d.data.width || 150)
                .attr("height", 36)
                .attr("y", -18)
                .attr("rx", 6).attr("ry", 6)
                .attr("fill", d => d.data.color)
                .attr("stroke", "#0f172a")
                .attr("stroke-width", 2);
                
            nodeEnter.filter(d => d.data.group === "root")
                .append("image")
                .attr("href", "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23334155' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/></svg>")
                .attr("width", 32).attr("height", 32)
                .attr("x", -16).attr("y", -16);
                
            nodeEnter.append("rect")
                .attr("class", "text-bg")
                .attr("fill", "rgba(255, 255, 255, 0.75)")
                .attr("rx", 3).attr("ry", 3);
                
            nodeEnter.append("text")
                .attr("class", "node-label")
                .attr("dy", d => d.data.group === "root" ? "28px" : "0.31em")
                .attr("x", d => d.data.group === "root" ? 0 : 12)
                .attr("text-anchor", d => d.data.group === "root" ? "middle" : "start")
                .style("fill", "#0f172a").style("font-weight", "500")
                .text(d => d.data.name);

            const nodeUpdate = nodeEnter.merge(node);

            // CLICK HANDLERS
            nodeUpdate.on("click", (event, d) => {
                event.stopPropagation();
                const mode = document.querySelector('input[name="interaction-mode"]:checked').value;

                if (mode === 'focus') {
                    document.getElementById("details-panel").style.display = "none";
                    if (d.data.group === 'root') {
                        clearFocus();
                    } else if (d.data.group === 'category') {
                        activeFocus = { type: 'category', name: d.data.name };
                        updateFocusIndicator();
                        updateGraph(parseInt(slider.value));
                    } else if (d.data.group === 'label') {
                        const catName = d.parent ? d.parent.data.name : null;
                        if (catName) {
                            activeFocus = { type: 'label', catName: catName, labelName: d.data.name };
                            updateFocusIndicator();
                            updateGraph(parseInt(slider.value));
                        }
                    }
                } else if (mode === 'inspect') {
                    showDetails(d.data);
                    
                    // Lógica para Expandir/Contraer (Ignorar Root y Rule)
                    if (d.data.group !== 'root' && d.data.group !== 'rule') {
                        if (collapsedNodes.has(d.data.id)) {
                            collapsedNodes.delete(d.data.id); // Expandir
                        } else {
                            collapsedNodes.add(d.data.id); // Contraer
                        }
                        updateGraph(parseInt(slider.value));
                    }
                }
            });
            
            nodeUpdate.select(".node-label").each(function(d) {
                if (d.data.group === "rule") {
                    const padding = 24;
                    const maxWidth = (d.data.width || 150) - padding;
                    let textStr = d.data.name;
                    this.textContent = textStr;
                    
                    if (this.getComputedTextLength() > maxWidth && textStr.length > 3) {
                        let idx = textStr.length;
                        while (this.getComputedTextLength() > maxWidth && idx > 0) {
                            idx--;
                            this.textContent = textStr.slice(0, idx) + "...";
                        }
                    }
                }
            });

            nodeUpdate.each(function(d) {
                const textNode = d3.select(this).select(".node-label").node();
                if (textNode && textNode.getBBox) {
                    const bbox = textNode.getBBox();
                    if (d.data.group !== "root") {
                        d3.select(this).select(".text-bg")
                            .attr("x", bbox.x - 4).attr("y", bbox.y - 2)
                            .attr("width", bbox.width + 8).attr("height", bbox.height + 4);
                    }
                }
            });
            
            // Añadir indicación visual (borde azul punteado) a los nodos colapsados
            nodeUpdate.select(".main-rect")
                .attr("stroke-dasharray", d => d._children ? "4,4" : "none")
                .attr("stroke", d => d._children ? "#3b82f6" : "#0f172a")
                .attr("stroke-width", d => d._children ? 3 : 2);
            
            nodeUpdate.classed("node-new", d => addedIds.has(d.data.id));

            nodeUpdate.transition().duration(800)
                .attr("transform", d => `translate(${d.y},${d.x})`)
                .style("opacity", 1);
                
            node.exit().transition().duration(500)
                .attr("transform", d => `translate(${d.parent ? d.parent.y : d.y - 20},${d.parent ? d.parent.x : d.x})`)
                .style("opacity", 0)
                .remove();
        }

        // Player controls
        let playInterval;
        let isPlaying = false;

        function stepNext() {
            let val = parseInt(slider.value);
            if (val >= totalCommits - 1) {
                togglePlay(); 
                return;
            }
            slider.value = val + 1;
            updateGraph(val + 1);
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                if (parseInt(slider.value) >= totalCommits - 1) slider.value = 0; 
                playBtn.innerHTML = svgPause;
                updateGraph(parseInt(slider.value));
                playInterval = setInterval(stepNext, 1800); 
            } else {
                playBtn.innerHTML = svgPlay;
                clearInterval(playInterval);
            }
        }

        playBtn.addEventListener("click", togglePlay);
        
        slider.addEventListener("input", (e) => {
            if (isPlaying) togglePlay(); 
            updateGraph(parseInt(e.target.value));
        });

        window.addEventListener("resize", () => {
            width = container.clientWidth;
            height = container.clientHeight;
            svg.attr("width", width).attr("height", height);
            
            if (document.getElementById("auto-fit-toggle").checked && totalCommits > 0) {
                updateGraph(parseInt(slider.value));
            }
        });

        if (totalCommits > 0) {
            updateGraph(0);
        } else {
            container.innerHTML = "<h2 style='text-align:center; margin-top: 50px; color: #94a3b8;'>No commits data found.</h2>";
        }
    </script>
</body>
