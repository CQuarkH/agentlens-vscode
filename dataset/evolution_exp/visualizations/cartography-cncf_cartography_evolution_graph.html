s (scoped to organization/tenant)\n- Infrastructure resources (scoped to AWS account, Azure subscription, etc.)\n- Application assets (scoped to company/tenant)", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "width": 231}, {"id": "rule_Implementation_Impl. Details_eaec124a9a", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#984ea3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:", "width": 231}, {"id": "rule_Implementation_Impl. Details_6ab12aad60", "name": "Use Python 3.9+ style type hin...", "group": "rule", "color": "#984ea3", "raw_text": "Use Python 3.9+ style type hints throughout your code:", "width": 231}, {"id": "rule_Implementation_Impl. Details_cff38a5202", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass", "width": 231}, {"id": "rule_Implementation_Impl. Details_89f576516a", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "width": 231}]}, {"id": "lbl_Implementation_Architecture", "name": "Architecture", "group": "label", "color": "#dabcdf", "children": [{"id": "rule_Implementation_Architecture_9a2ee2cfcc", "name": "Every Cartography intel module...", "group": "rule", "color": "#dabcdf", "raw_text": "Every Cartography intel module follows this structure:", "width": 231}, {"id": "rule_Implementation_Architecture_ac2e00ef69", "name": "The Ontology system works in t...", "group": "rule", "color": "#dabcdf", "raw_text": "The Ontology system works in two ways:\n1. **Semantic Labels**: Adds semantic labels (like `UserAccount`) and prefixed properties (`_ont_*`) directly to source nodes for cross-module querying during ingestion\n2. **Canonical Nodes**: Creates canonical node (like `(:User:Ontology)`) that represent unified entities", "width": 231}, {"id": "rule_Implementation_Architecture_ce6747abc4", "name": "Rules use a simple two-level h...", "group": "rule", "color": "#dabcdf", "raw_text": "Rules use a simple two-level hierarchy:\n\n```\nRule (e.g., \"unmanaged-accounts\")\n  \u2514\u2500 Fact (e.g., \"unmanaged-accounts-ontology\")\n```\n\n- **Rule**: Represents a security issue or attack surface (e.g., \"User accounts not linked to a user identity\")\n- **Fact**: Individual Cypher query that gathers evidence about your environment\n- **Finding**: Pydantic model that defines the structure of results", "width": 231}, {"id": "rule_Implementation_Architecture_368998f1be", "name": "Each Rule must define an outpu...", "group": "rule", "color": "#dabcdf", "raw_text": "Each Rule must define an output model extending `Finding`:", "width": 231}, {"id": "rule_Implementation_Architecture_abf4618cb2", "name": "- **Inherit from `Finding`**: ...", "group": "rule", "color": "#dabcdf", "raw_text": "- **Inherit from `Finding`**: Your model must extend the base class\n- **Match Query Aliases**: Field names must match `cypher_query` aliases\n- **Automatic Handling**: The `source` field is auto-populated with module name", "width": 231}, {"id": "rule_Implementation_Architecture_bf35e82e0f", "name": "Use semantic versioning for ru...", "group": "rule", "color": "#dabcdf", "raw_text": "Use semantic versioning for rules:", "width": 231}]}]}, {"id": "cat_Build", "name": "Build", "group": "category", "color": "#377EB8", "children": [{"id": "lbl_Build_Testing", "name": "Testing", "group": "label", "color": "#377eb8", "children": [{"id": "rule_Build_Testing_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#377eb8", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}, {"id": "rule_Build_Testing_29ebd4746b", "name": "Unit tests are only for testin...", "group": "rule", "color": "#377eb8", "raw_text": "Unit tests are only for testing smaller functions and verifying that the outputs are as expected.", "width": 231}, {"id": "rule_Build_Testing_ff52be09a9", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#377eb8", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes", "width": 231}, {"id": "rule_Build_Testing_dbf929df3d", "name": "**What NOT to Test:**\n- \u274c **Im...", "group": "rule", "color": "#377eb8", "raw_text": "**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "width": 231}, {"id": "rule_Build_Testing_a3ed088fd6", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#377eb8", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests", "width": 231}, {"id": "rule_Build_Testing_1a98d1c75d", "name": "**When NOT to Mock:**\n- \u274c Inte...", "group": "rule", "color": "#377eb8", "raw_text": "**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "width": 231}, {"id": "rule_Build_Testing_1063b9d08c", "name": "**Before touching any code**, ...", "group": "rule", "color": "#377eb8", "raw_text": "**Before touching any code**, ensure you have comprehensive test coverage:", "width": 231}, {"id": "rule_Build_Testing_8fab45f8fa", "name": "- **CRITICAL**: Run the test a...", "group": "rule", "color": "#377eb8", "raw_text": "- **CRITICAL**: Run the test and ensure it passes before proceeding\n- If the test doesn't exist or fails, fix it first - **no exceptions**", "width": 231}, {"id": "rule_Build_Testing_710fa4ba61", "name": "#### 2d. Test Continuously\n- R...", "group": "rule", "color": "#377eb8", "raw_text": "#### 2d. Test Continuously\n- Run your integration test after each change\n- Ensure it still passes - if not, debug before continuing\n- You may need to update minor details in tests due to data model differences", "width": 231}, {"id": "rule_Build_Testing_07d018e4de", "name": "**Do NOT explicitly test clean...", "group": "rule", "color": "#377eb8", "raw_text": "**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "width": 231}, {"id": "rule_Build_Testing_1882d297c7", "name": "**Stop and ask the user** if y...", "group": "rule", "color": "#377eb8", "raw_text": "**Stop and ask the user** if you encounter:\n- Unclear business logic in legacy Cypher\n- Complex relationships that don't map clearly to data model\n- Test failures you can't resolve\n- Multiple modules that seem interdependent", "width": 231}, {"id": "rule_Build_Testing_6dcff5694a", "name": "If no test exists, **CREATE IT...", "group": "rule", "color": "#377eb8", "raw_text": "If no test exists, **CREATE IT FIRST** before any refactoring:", "width": 231}]}, {"id": "lbl_Build_Conf.&Env.", "name": "Conf.&Env.", "group": "label", "color": "#b2d0e8", "children": [{"id": "rule_Build_Conf.&Env._9105076986", "name": "Add your configuration options...", "group": "rule", "color": "#b2d0e8", "raw_text": "Add your configuration options in `cartography/cli.py`:", "width": 231}, {"id": "rule_Build_Conf.&Env._7e1647de82", "name": "Add fields to `cartography/con...", "group": "rule", "color": "#b2d0e8", "raw_text": "Add fields to `cartography/config.py`:", "width": 231}, {"id": "rule_Build_Conf.&Env._f2c6d2344a", "name": "**2. Register rule** in `carto...", "group": "rule", "color": "#b2d0e8", "raw_text": "**2. Register rule** in `cartography/rules/data/rules/__init__.py`:", "width": 231}]}]}, {"id": "cat_Quality", "name": "Quality", "group": "category", "color": "#4DAF4A", "children": [{"id": "lbl_Quality_Maintenance", "name": "Maintenance", "group": "label", "color": "#4daf4a", "children": [{"id": "rule_Quality_Maintenance_69b04e5057", "name": "**IMPORTANT**: A critical task...", "group": "rule", "color": "#4daf4a", "raw_text": "**IMPORTANT**: A critical task for AI agents is refactoring legacy Cartography code from handwritten Cypher queries to the modern data model approach. This section provides a step-by-step procedure to safely perform these refactors.", "width": 231}, {"id": "rule_Quality_Maintenance_1514b39644", "name": "#### 3a. Remove Index Entries\n...", "group": "rule", "color": "#4daf4a", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "width": 231}, {"id": "rule_Quality_Maintenance_a2e77c011a", "name": "#### 3b. Remove Cleanup Job Fi...", "group": "rule", "color": "#4daf4a", "raw_text": "#### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "width": 231}, {"id": "rule_Quality_Maintenance_6d6c04f9da", "name": "Always implement cleanup to re...", "group": "rule", "color": "#4daf4a", "raw_text": "Always implement cleanup to remove stale data:", "width": 231}, {"id": "rule_Quality_Maintenance_0eafffeb34", "name": "A successful refactor should:\n...", "group": "rule", "color": "#4daf4a", "raw_text": "A successful refactor should:\n1. **Preserve all functionality** - tests pass\n2. **Use data model** - no handwritten Cypher for CRUD operations\n3. **Clean up legacy files** - indexes and cleanup jobs removed\n4. **Maintain performance** - no significant speed degradation\n5. **Follow patterns** - consistent with other modern modules", "width": 231}]}, {"id": "lbl_Quality_Performance", "name": "Performance", "group": "label", "color": "#bce2bb", "children": [{"id": "rule_Quality_Performance_699d1f526d", "name": "MatchLinks have significant pe...", "group": "rule", "color": "#bce2bb", "raw_text": "MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph", "width": 231}, {"id": "rule_Quality_Performance_f00113a173", "name": "Note though that if a field is...", "group": "rule", "color": "#bce2bb", "raw_text": "Note though that if a field is referred to in a target node matcher, it will be indexed automatically.", "width": 231}]}]}, {"id": "cat_General", "name": "General", "group": "category", "color": "#E41A1C", "children": [{"id": "lbl_General_AI Integration", "name": "AI Integration", "group": "label", "color": "#e31a1b", "children": [{"id": "rule_General_AI Integration_af6e38b7bd", "name": "1. **Check existing patterns f...", "group": "rule", "color": "#e31a1b", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "width": 231}, {"id": "rule_General_AI Integration_8827f3ac30", "name": "The fastest way to get started...", "group": "rule", "color": "#e31a1b", "raw_text": "The fastest way to get started is to copy the structure from an existing module:\n\n- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "width": 231}, {"id": "rule_General_AI Integration_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#e31a1b", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}, {"id": "rule_General_AI Integration_1184a729da", "name": "**IMPORTANT**: A critical task...", "group": "rule", "color": "#e31a1b", "raw_text": "**IMPORTANT**: A critical task for AI agents is refactoring legacy Cartography code from handwritten Cypher queries to the modern data model approach.", "width": 231}]}, {"id": "lbl_General_Documentation", "name": "Documentation", "group": "label", "color": "#f5aaaa", "children": [{"id": "rule_General_Documentation_c4ae948352", "name": "- **Logs**: Look for import er...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "width": 231}, {"id": "rule_General_Documentation_4c8b62beb2", "name": "**Critical Files to Know:**\n- ...", "group": "rule", "color": "#f5aaaa", "raw_text": "**Critical Files to Know:**\n- `cartography/config.py` - Configuration object definitions\n- `cartography/cli.py` - Command-line argument definitions\n- `cartography/client/core/tx.py` - Core `load()` function\n- `cartography/graph/job.py` - Cleanup job utilities\n- `cartography/models/core/` - Base data model classes", "width": 231}]}]}]}, "index": 3}, {"commit": "c79e1ce3f763001cf7145614b5cc069c15bfb550", "tree": {"id": "root", "name": "cartography-cncf/cartography - AGENTS.md", "group": "root", "color": "#1e293b", "children": [{"id": "cat_General", "name": "General", "group": "category", "color": "#E41A1C", "children": [{"id": "lbl_General_AI Integration", "name": "AI Integration", "group": "label", "color": "#e31a1b", "children": [{"id": "rule_General_AI Integration_69b04e5057", "name": "**IMPORTANT**: A critical task...", "group": "rule", "color": "#e31a1b", "raw_text": "**IMPORTANT**: A critical task for AI agents is refactoring legacy Cartography code from handwritten Cypher queries to the modern data model approach. This section provides a step-by-step procedure to safely perform these refactors.", "width": 231}, {"id": "rule_General_AI Integration_1063b9d08c", "name": "**Before touching any code**, ...", "group": "rule", "color": "#e31a1b", "raw_text": "**Before touching any code**, ensure you have comprehensive test coverage:", "width": 231}, {"id": "rule_General_AI Integration_8fab45f8fa", "name": "- **CRITICAL**: Run the test a...", "group": "rule", "color": "#e31a1b", "raw_text": "- **CRITICAL**: Run the test and ensure it passes before proceeding\n- If the test doesn't exist or fails, fix it first - **no exceptions**", "width": 231}, {"id": "rule_General_AI Integration_73c1052f0c", "name": "### \ud83d\uded1 When to Stop and Ask\n\nRe...", "group": "rule", "color": "#e31a1b", "raw_text": "### \ud83d\uded1 When to Stop and Ask\n\nRefactors can be complex. **Stop and ask the user** if you encounter:\n- Unclear business logic in legacy Cypher\n- Complex relationships that don't map clearly to data model\n- Test failures you can't resolve\n- Multiple modules that seem interdependent", "width": 231}, {"id": "rule_General_AI Integration_af6e38b7bd", "name": "1. **Check existing patterns f...", "group": "rule", "color": "#e31a1b", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "width": 231}, {"id": "rule_General_AI Integration_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#e31a1b", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}]}, {"id": "lbl_General_Documentation", "name": "Documentation", "group": "label", "color": "#f5aaaa", "children": [{"id": "rule_General_Documentation_0dd592f7fa", "name": "- **Simple module**: `cartogra...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "width": 231}, {"id": "rule_General_Documentation_c4ae948352", "name": "- **Logs**: Look for import er...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "width": 231}]}]}, {"id": "cat_Implementation", "name": "Implementation", "group": "category", "color": "#984EA3", "children": [{"id": "lbl_Implementation_Architecture", "name": "Architecture", "group": "label", "color": "#994ea4", "children": [{"id": "rule_Implementation_Architecture_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#994ea4", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "width": 231}, {"id": "rule_Implementation_Architecture_7558c90296", "name": "**\u2705 Correct Examples:**\n- **AW...", "group": "rule", "color": "#994ea4", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "width": 231}, {"id": "rule_Implementation_Architecture_dc72f409a3", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#994ea4", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "width": 231}, {"id": "rule_Implementation_Architecture_c9bc0fa12f", "name": "**Prefer standard node schemas...", "group": "rule", "color": "#994ea4", "raw_text": "**Prefer standard node schemas + relationship schemas** whenever possible:", "width": 231}, {"id": "rule_Implementation_Architecture_e3a7dad624", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#994ea4", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "width": 231}, {"id": "rule_Implementation_Architecture_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#994ea4", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "width": 231}, {"id": "rule_Implementation_Architecture_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#994ea4", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "width": 231}, {"id": "rule_Implementation_Architecture_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#994ea4", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#984ea3", "children": [{"id": "rule_Implementation_Impl. Details_b498b122d6", "name": "Every sync function follows th...", "group": "rule", "color": "#984ea3", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba8fa505d6", "name": "1. **Minimal Error Handling**:...", "group": "rule", "color": "#984ea3", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "width": 231}, {"id": "rule_Implementation_Impl. Details_aa82198b92", "name": "2. **Use Decorators**: For AWS...", "group": "rule", "color": "#984ea3", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "width": 231}, {"id": "rule_Implementation_Impl. Details_d02bceaf0e", "name": "3. **Fail Loudly**: If an erro...", "group": "rule", "color": "#984ea3", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "width": 231}, {"id": "rule_Implementation_Impl. Details_64ff8649be", "name": "4. **Timeout Configuration**: ...", "group": "rule", "color": "#984ea3", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "width": 231}, {"id": "rule_Implementation_Impl. Details_8782cb0a0f", "name": "- **Required fields**: Use `da...", "group": "rule", "color": "#984ea3", "raw_text": "- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#984ea3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "width": 231}, {"id": "rule_Implementation_Impl. Details_43e92044df", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#984ea3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#984ea3", "raw_text": "Always implement cleanup for MatchLinks:", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5ee467071", "name": "The `required` parameter in `O...", "group": "rule", "color": "#984ea3", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "width": 231}, {"id": "rule_Implementation_Impl. Details_feb8f788a7", "name": "The `eligible_for_source` para...", "group": "rule", "color": "#984ea3", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "width": 231}, {"id": "rule_Implementation_Impl. Details_e35f931bb9", "name": "#### 1. Choose the Right Prima...", "group": "rule", "color": "#984ea3", "raw_text": "#### 1. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`", "width": 231}, {"id": "rule_Implementation_Impl. Details_6b95b26dc6", "name": "#### 2. Use Required Fields St...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing", "width": 231}, {"id": "rule_Implementation_Impl. Details_610d6ab52b", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_ab37f5bf96", "name": "- When key assumptions your co...", "group": "rule", "color": "#984ea3", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "width": 231}, {"id": "rule_Implementation_Impl. Details_6183e7134c", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#984ea3", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba072382e3", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#984ea3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:\n\n```python\n# \u274c DON'T: Manually parse dates or convert to epoch timestamps\n\"created_at\": int(dt_parse.parse(user_data[\"created_at\"]).timestamp() * 1000)\n\"last_login\": dict_date_to_epoch({\"d\": dt_parse.parse(data[\"last_login\"])}, \"d\")\n\n# \u2705 DO: Pass datetime values directly\n\"created_at\": user_data.get(\"created_at\")  # AWS/API returns ISO 8601 dates\n\"last_login\": user_data.get(\"last_login\")  # Neo4j handles these natively\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_451fea0416", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#984ea3", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "width": 231}, {"id": "rule_Implementation_Impl. Details_36de71c72a", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#984ea3", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "width": 231}, {"id": "rule_Implementation_Impl. Details_92757401c3", "name": "#### 2b. Replace load_* Functi...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2b. Replace load_* Functions\nReplace handwritten Cypher in load functions with data model `load()` calls:", "width": 231}, {"id": "rule_Implementation_Impl. Details_a2993c3138", "name": "#### 2c. Replace cleanup_* Fun...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2c. Replace cleanup_* Functions\nReplace handwritten cleanup with data model cleanup:", "width": 231}, {"id": "rule_Implementation_Impl. Details_710fa4ba61", "name": "#### 2d. Test Continuously\n- R...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2d. Test Continuously\n- Run your integration test after each change\n- Ensure it still passes - if not, debug before continuing\n- You may need to update minor details in tests due to data model differences", "width": 231}, {"id": "rule_Implementation_Impl. Details_9b2ac12b36", "name": "**Note**: Only remove indexes ...", "group": "rule", "color": "#984ea3", "raw_text": "**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "width": 231}, {"id": "rule_Implementation_Impl. Details_c9b9c24843", "name": "**Note**: Only remove cleanup ...", "group": "rule", "color": "#984ea3", "raw_text": "**Note**: Only remove cleanup files for modules you've fully converted.", "width": 231}, {"id": "rule_Implementation_Impl. Details_bf58454db6", "name": "### \ud83d\udeab What NOT to Test\n\n**Do N...", "group": "rule", "color": "#984ea3", "raw_text": "### \ud83d\udeab What NOT to Test\n\n**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#984ea3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#dabcdf", "children": [{"id": "rule_Implementation_Impl. Details_ae79cd26a7", "name": "Use Python 3.9+ style type hin...", "group": "rule", "color": "#dabcdf", "raw_text": "Use Python 3.9+ style type hints throughout your code:\n\n```python\n# \u2705 DO: Use built-in type hints (Python 3.9+)\ndef get_users(api_key: str) -> dict[str, Any]:\n    ...\n\ndef transform(data: list[dict[str, Any]]) -> list[dict[str, Any]]:\n    ...\n\n# \u274c DON'T: Use objects from typing module\ndef get_users(api_key: str) -> Dict[str, Any]:\n    ...\n\ndef transform(data: List[Dict[str, Any]]) -> List[Dict[str, Any]]:\n    ...\n\n# \u2705 DO: Use union operator for optional types\ndef process_user(user_id: str | None) -> None:\n    ...\n\n# \u274c DON'T: Use Optional from typing\ndef process_user(user_id: Optional[str]) -> None:\n    ...\n```", "width": 231}]}]}, {"id": "cat_Build", "name": "Build", "group": "category", "color": "#377EB8", "children": [{"id": "lbl_Build_Testing", "name": "Testing", "group": "label", "color": "#377eb8", "children": [{"id": "rule_Build_Testing_29ebd4746b", "name": "Unit tests are only for testin...", "group": "rule", "color": "#377eb8", "raw_text": "Unit tests are only for testing smaller functions and verifying that the outputs are as expected.", "width": 231}, {"id": "rule_Build_Testing_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#377eb8", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}, {"id": "rule_Build_Testing_1bff1e03e4", "name": "Test that your ontology integr...", "group": "rule", "color": "#377eb8", "raw_text": "Test that your ontology integration works correctly:", "width": 231}, {"id": "rule_Build_Testing_1154339282", "name": "- Check for integration tests ...", "group": "rule", "color": "#377eb8", "raw_text": "- Check for integration tests in `tests/integration/cartography/intel/[module]/`\n- The test MUST call the sync function directly (refer to [#testing](#testing))\n- If no test exists, **CREATE IT FIRST** before any refactoring:", "width": 231}, {"id": "rule_Build_Testing_b88c3cd530", "name": "**Issue**: Unit tests failing ...", "group": "rule", "color": "#377eb8", "raw_text": "**Issue**: Unit tests failing on required field validation\n**Solution**: Ensure that:\n- Primary identifier fields (`email` for users, `hostname` for devices) are marked as `required=True`\n- The field names match exactly between your ontology mapping and node properties", "width": 231}]}, {"id": "lbl_Build_Conf.&Env.", "name": "Conf.&Env.", "group": "label", "color": "#b2d0e8", "children": [{"id": "rule_Build_Conf.&Env._1ea645cc95", "name": "Add your configuration options...", "group": "rule", "color": "#b2d0e8", "raw_text": "Add your configuration options in `cartography/cli.py`:\n\n```python\n# In add_auth_args function\nparser.add_argument(\n    '--your-service-api-key-env-var',\n    type=str,\n    help='Name of environment variable containing Your Service API key',\n)\n\nparser.add_argument(\n    '--your-service-tenant-id',\n    type=str,\n    help='Your Service tenant ID',\n)\n```", "width": 231}, {"id": "rule_Build_Conf.&Env._c98dd9137b", "name": "Add fields to `cartography/con...", "group": "rule", "color": "#b2d0e8", "raw_text": "Add fields to `cartography/config.py`:\n\n```python\n@dataclass\nclass Config:\n    # ... existing fields ...\n    your_service_api_key: str | None = None\n    your_service_tenant_id: str | None = None\n```", "width": 231}, {"id": "rule_Build_Conf.&Env._eea0a797d1", "name": "Set `scoped_cleanup=False` **O...", "group": "rule", "color": "#b2d0e8", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "width": 231}]}]}, {"id": "cat_Management", "name": "Management", "group": "category", "color": "#FF7F00", "children": [{"id": "lbl_Management_Development Process", "name": "Development Process", "group": "label", "color": "#ff7f00", "children": [{"id": "rule_Management_Development Process_b4008176e6", "name": "### \ud83d\udccb Refactoring Checklist\n\nB...", "group": "rule", "color": "#ff7f00", "raw_text": "### \ud83d\udccb Refactoring Checklist\n\nBefore submitting a refactor:\n\n- [ ] \u2705 **Integration test exists and passes** for the sync function\n- [ ] \u2705 **Data model schemas** defined with proper relationships\n- [ ] \u2705 **Legacy load functions** converted to use `load()`\n- [ ] \u2705 **Legacy cleanup functions** converted to use `GraphJob.from_node_schema()`\n- [ ] \u2705 **Tests still pass** after all changes\n- [ ] \u2705 **Index entries removed** from `indexes.cypher`\n- [ ] \u2705 **Cleanup JSON files removed** from cleanup directory\n- [ ] \u2705 **No regressions** - all functionality preserved", "width": 231}, {"id": "rule_Management_Development Process_47dc0dc1b7", "name": "## \ud83c\udfaf Final Checklist\n\nBefore s...", "group": "rule", "color": "#ff7f00", "raw_text": "## \ud83c\udfaf Final Checklist\n\nBefore submitting your module:\n\n- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields\n- [ ] \u2705 **Testing**: Integration tests for sync functions\n- [ ] \u2705 **Documentation**: Schema docs, docstrings, inline comments\n- [ ] \u2705 **Cleanup**: Proper cleanup job implementation\n- [ ] \u2705 **Indexing**: Extra indexes on frequently queried fields", "width": 231}, {"id": "rule_Management_Development Process_89c98a72a7", "name": "### \ud83c\udfaf Success Criteria\n\nA succ...", "group": "rule", "color": "#ff7f00", "raw_text": "### \ud83c\udfaf Success Criteria\n\nA successful refactor should:\n1. **Preserve all functionality** - tests pass\n2. **Use data model** - no handwritten Cypher for CRUD operations\n3. **Clean up legacy files** - indexes and cleanup jobs removed\n4. **Maintain performance** - no significant speed degradation\n5. **Follow patterns** - consistent with other modern modules", "width": 231}]}]}, {"id": "cat_Quality", "name": "Quality", "group": "category", "color": "#4DAF4A", "children": [{"id": "lbl_Quality_Performance", "name": "Performance", "group": "label", "color": "#bce2bb", "children": [{"id": "rule_Quality_Performance_699d1f526d", "name": "MatchLinks have significant pe...", "group": "rule", "color": "#bce2bb", "raw_text": "MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph", "width": 231}, {"id": "rule_Quality_Performance_f00113a173", "name": "Note though that if a field is...", "group": "rule", "color": "#bce2bb", "raw_text": "Note though that if a field is referred to in a target node matcher, it will be indexed automatically.", "width": 231}]}, {"id": "lbl_Quality_Maintenance", "name": "Maintenance", "group": "label", "color": "#4daf4a", "children": [{"id": "rule_Quality_Maintenance_e5f2b49916", "name": "Always implement cleanup to re...", "group": "rule", "color": "#4daf4a", "raw_text": "Always implement cleanup to remove stale data:\n\n```python\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    \"\"\"\n    Remove nodes that weren't updated in this sync run\n    \"\"\"\n    logger.debug(\"Running Your Service cleanup job\")\n\n    # Cleanup users\n    GraphJob.from_node_schema(YourServiceUserSchema(), common_job_parameters).run(neo4j_session)\n```", "width": 231}, {"id": "rule_Quality_Maintenance_54f2ba0ab6", "name": "#### 3a. Remove Index Entries\n...", "group": "rule", "color": "#4daf4a", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```", "width": 231}]}]}]}, "index": 4}, {"commit": "b7b70aa8c9c59a8524544603d61be9819a2141c9", "tree": {"id": "root", "name": "cartography-cncf/cartography - AGENTS.md", "group": "root", "color": "#1e293b", "children": [{"id": "cat_General", "name": "General", "group": "category", "color": "#E41A1C", "children": [{"id": "lbl_General_AI Integration", "name": "AI Integration", "group": "label", "color": "#e31a1b", "children": [{"id": "rule_General_AI Integration_23aa54421b", "name": "**For AI Coding Assistants**: ...", "group": "rule", "color": "#e31a1b", "raw_text": "**For AI Coding Assistants**: This document provides comprehensive guidance for understanding and developing Cartography intel modules. It contains codebase-specific patterns, architectural decisions, and implementation details necessary for effective AI-assisted development within the Cartography project.", "width": 231}, {"id": "rule_General_AI Integration_69b04e5057", "name": "**IMPORTANT**: A critical task...", "group": "rule", "color": "#e31a1b", "raw_text": "**IMPORTANT**: A critical task for AI agents is refactoring legacy Cartography code from handwritten Cypher queries to the modern data model approach. This section provides a step-by-step procedure to safely perform these refactors.", "width": 231}, {"id": "rule_General_AI Integration_af6e38b7bd", "name": "1. **Check existing patterns f...", "group": "rule", "color": "#e31a1b", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "width": 231}, {"id": "rule_General_AI Integration_73c1052f0c", "name": "### \ud83d\uded1 When to Stop and Ask\n\nRe...", "group": "rule", "color": "#e31a1b", "raw_text": "### \ud83d\uded1 When to Stop and Ask\n\nRefactors can be complex. **Stop and ask the user** if you encounter:\n- Unclear business logic in legacy Cypher\n- Complex relationships that don't map clearly to data model\n- Test failures you can't resolve\n- Multiple modules that seem interdependent", "width": 231}, {"id": "rule_General_AI Integration_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#e31a1b", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}, {"id": "rule_General_AI Integration_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#e31a1b", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "width": 231}]}, {"id": "lbl_General_Documentation", "name": "Documentation", "group": "label", "color": "#f5aaaa", "children": [{"id": "rule_General_Documentation_c4ae948352", "name": "- **Logs**: Look for import er...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "width": 231}, {"id": "rule_General_Documentation_ae79cd26a7", "name": "Use Python 3.9+ style type hin...", "group": "rule", "color": "#f5aaaa", "raw_text": "Use Python 3.9+ style type hints throughout your code:\n\n```python\n# \u2705 DO: Use built-in type hints (Python 3.9+)\ndef get_users(api_key: str) -> dict[str, Any]:\n    ...\n\ndef transform(data: list[dict[str, Any]]) -> list[dict[str, Any]]:\n    ...\n\n# \u274c DON'T: Use objects from typing module\ndef get_users(api_key: str) -> Dict[str, Any]:\n    ...\n\ndef transform(data: List[Dict[str, Any]]) -> List[Dict[str, Any]]:\n    ...\n\n# \u2705 DO: Use union operator for optional types\ndef process_user(user_id: str | None) -> None:\n    ...\n\n# \u274c DON'T: Use Optional from typing\ndef process_user(user_id: Optional[str]) -> None:\n    ...\n```", "width": 231}]}]}, {"id": "cat_Implementation", "name": "Implementation", "group": "category", "color": "#984EA3", "children": [{"id": "lbl_Implementation_Architecture", "name": "Architecture", "group": "label", "color": "#dabcdf", "children": [{"id": "rule_Implementation_Architecture_fec35bdd90", "name": "**Key Cartography Concepts:**\n...", "group": "rule", "color": "#dabcdf", "raw_text": "**Key Cartography Concepts:**\n- **Intel Module**: Component that fetches data from external APIs and loads into Neo4j\n- **Sync Pattern**: `get()` \u2192 `transform()` \u2192 `load()` \u2192 `cleanup()`\n- **Data Model**: Declarative schema using `CartographyNodeSchema` and `CartographyRelSchema`\n- **Update Tag**: Timestamp used for cleanup jobs to remove stale data", "width": 231}, {"id": "rule_Implementation_Architecture_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#dabcdf", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "width": 231}, {"id": "rule_Implementation_Architecture_7558c90296", "name": "**\u2705 Correct Examples:**\n- **AW...", "group": "rule", "color": "#dabcdf", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "width": 231}, {"id": "rule_Implementation_Architecture_f553f2b4eb", "name": "**Why This Matters:**\n1. **Cle...", "group": "rule", "color": "#dabcdf", "raw_text": "**Why This Matters:**\n1. **Cleanup Operations**: Cartography uses the sub-resource relationship to determine which data to clean up during sync operations\n2. **Data Organization**: Tenant-like objects provide natural boundaries for data organization\n3. **Access Control**: Tenant relationships enable proper access control and data isolation\n4. **Consistency**: Following this pattern ensures consistent data modeling across all modules", "width": 231}, {"id": "rule_Implementation_Architecture_dc72f409a3", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#dabcdf", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "width": 231}, {"id": "rule_Implementation_Architecture_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#dabcdf", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "width": 231}, {"id": "rule_Implementation_Architecture_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#dabcdf", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "width": 231}, {"id": "rule_Implementation_Architecture_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#dabcdf", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "width": 231}, {"id": "rule_Implementation_Architecture_21a6a4ac35", "name": "**Relationship Directions:**\n-...", "group": "rule", "color": "#dabcdf", "raw_text": "**Relationship Directions:**\n- `LinkDirection.OUTWARD`: `(:YourServiceUser)-[:RESOURCE]->(:YourServiceTenant)`\n- `LinkDirection.INWARD`: `(:YourServiceUser)<-[:RESOURCE]-(:YourServiceTenant)`", "width": 231}, {"id": "rule_Implementation_Architecture_ec0df769d9", "name": "It is possible (and encouraged...", "group": "rule", "color": "#dabcdf", "raw_text": "It is possible (and encouraged) for more than one intel module to modify the same node type. However, there are two distinct patterns for this:", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#984ea3", "children": [{"id": "rule_Implementation_Impl. Details_b498b122d6", "name": "Every sync function follows th...", "group": "rule", "color": "#984ea3", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_c9da522f35", "name": "The `get` function should be \"...", "group": "rule", "color": "#984ea3", "raw_text": "The `get` function should be \"dumb\" - just fetch data and raise exceptions on failure:", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba8fa505d6", "name": "1. **Minimal Error Handling**:...", "group": "rule", "color": "#984ea3", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "width": 231}, {"id": "rule_Implementation_Impl. Details_aa82198b92", "name": "2. **Use Decorators**: For AWS...", "group": "rule", "color": "#984ea3", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "width": 231}, {"id": "rule_Implementation_Impl. Details_d02bceaf0e", "name": "3. **Fail Loudly**: If an erro...", "group": "rule", "color": "#984ea3", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "width": 231}, {"id": "rule_Implementation_Impl. Details_64ff8649be", "name": "4. **Timeout Configuration**: ...", "group": "rule", "color": "#984ea3", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "width": 231}, {"id": "rule_Implementation_Impl. Details_cda1b18ad0", "name": "**Key Principles:**\n- **Requir...", "group": "rule", "color": "#984ea3", "raw_text": "**Key Principles:**\n- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "width": 231}, {"id": "rule_Implementation_Impl. Details_78133b80bd", "name": "**PropertyRef Parameters:**\n- ...", "group": "rule", "color": "#984ea3", "raw_text": "**PropertyRef Parameters:**\n- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "width": 231}, {"id": "rule_Implementation_Impl. Details_cff38a5202", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass", "width": 231}, {"id": "rule_Implementation_Impl. Details_89f576516a", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "width": 231}, {"id": "rule_Implementation_Impl. Details_ed68537f91", "name": "### Required MatchLink Propert...", "group": "rule", "color": "#984ea3", "raw_text": "### Required MatchLink Properties\n\nAll MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5622872b0", "name": "### MatchLink Cleanup\n\nAlways ...", "group": "rule", "color": "#984ea3", "raw_text": "### MatchLink Cleanup\n\nAlways implement cleanup for MatchLinks:", "width": 231}, {"id": "rule_Implementation_Impl. Details_e3a7dad624", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "width": 231}, {"id": "rule_Implementation_Impl. Details_eea0a797d1", "name": "Set `scoped_cleanup=False` **O...", "group": "rule", "color": "#984ea3", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "width": 231}, {"id": "rule_Implementation_Impl. Details_fef0c928b1", "name": "**Examples where `scoped_clean...", "group": "rule", "color": "#984ea3", "raw_text": "**Examples where `scoped_cleanup=False` makes sense:**\n- Vulnerability databases (CVE data is global)\n- Threat intelligence feeds (IOCs are not tenant-specific)\n- Public certificate transparency logs\n- Global DNS/domain information\n\n**Default behavior (`scoped_cleanup=True`) is correct for:**\n- User accounts (scoped to organization/tenant)\n- Infrastructure resources (scoped to AWS account, Azure subscription, etc.)\n- Application assets (scoped to company/tenant)", "width": 231}, {"id": "rule_Implementation_Impl. Details_610d6ab52b", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```", "width": 231}, {"id": "rule_Implementation_Impl. Details_29ebd4746b", "name": "Unit tests are only for testin...", "group": "rule", "color": "#984ea3", "raw_text": "Unit tests are only for testing smaller functions and verifying that the outputs are as expected.", "width": 231}, {"id": "rule_Implementation_Impl. Details_451fea0416", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#984ea3", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "width": 231}, {"id": "rule_Implementation_Impl. Details_36de71c72a", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#984ea3", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "width": 231}, {"id": "rule_Implementation_Impl. Details_bf58454db6", "name": "### \ud83d\udeab What NOT to Test\n\n**Do N...", "group": "rule", "color": "#984ea3", "raw_text": "### \ud83d\udeab What NOT to Test\n\n**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "width": 231}, {"id": "rule_Implementation_Impl. Details_124e6b6b72", "name": "**CRITICAL**: Run the test and...", "group": "rule", "color": "#984ea3", "raw_text": "**CRITICAL**: Run the test and ensure it passes before proceeding\n- If the test doesn't exist or fails, fix it first - **no exceptions**", "width": 231}, {"id": "rule_Implementation_Impl. Details_1514b39644", "name": "#### 3a. Remove Index Entries\n...", "group": "rule", "color": "#984ea3", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "width": 231}, {"id": "rule_Implementation_Impl. Details_a2e77c011a", "name": "#### 3b. Remove Cleanup Job Fi...", "group": "rule", "color": "#984ea3", "raw_text": "#### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#984ea3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "width": 231}, {"id": "rule_Implementation_Impl. Details_f00113a173", "name": "Note though that if a field is...", "group": "rule", "color": "#984ea3", "raw_text": "Note though that if a field is referred to in a target node matcher, it will be indexed automatically.", "width": 231}, {"id": "rule_Implementation_Impl. Details_710fa4ba61", "name": "#### 2d. Test Continuously\n- R...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2d. Test Continuously\n- Run your integration test after each change\n- Ensure it still passes - if not, debug before continuing\n- You may need to update minor details in tests due to data model differences", "width": 231}, {"id": "rule_Implementation_Impl. Details_1063b9d08c", "name": "**Before touching any code**, ...", "group": "rule", "color": "#984ea3", "raw_text": "**Before touching any code**, ensure you have comprehensive test coverage:", "width": 231}]}]}, {"id": "cat_Quality", "name": "Quality", "group": "category", "color": "#4DAF4A", "children": [{"id": "lbl_Quality_Debugging", "name": "Debugging", "group": "label", "color": "#4daf4a", "children": [{"id": "rule_Quality_Debugging_f5b8e5b60f", "name": "Cartography (both the backend ...", "group": "rule", "color": "#4daf4a", "raw_text": "Cartography (both the backend ingestion jobs and any frontend surfaces that consume their results)\nlikes to fail loudly so that broken assumptions bubble exceptions up to operators instead of being\npapered over.", "width": 231}, {"id": "rule_Quality_Debugging_47a1513043", "name": "- When key assumptions your co...", "group": "rule", "color": "#4daf4a", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.", "width": 231}, {"id": "rule_Quality_Debugging_1545798d3f", "name": "- Lean toward propagating erro...", "group": "rule", "color": "#4daf4a", "raw_text": "- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.", "width": 231}, {"id": "rule_Quality_Debugging_0550c57fa4", "name": "- If you're confident data sho...", "group": "rule", "color": "#4daf4a", "raw_text": "- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.", "width": 231}, {"id": "rule_Quality_Debugging_330449dc39", "name": "- Avoid using `hasattr()`/`get...", "group": "rule", "color": "#4daf4a", "raw_text": "- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.", "width": 231}, {"id": "rule_Quality_Debugging_8b7da98e88", "name": "- Never manufacture \"safe\" def...", "group": "rule", "color": "#4daf4a", "raw_text": "- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "width": 231}, {"id": "rule_Quality_Debugging_5af5755370", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#4daf4a", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.", "width": 231}, {"id": "rule_Quality_Debugging_1f646eebfd", "name": "- **Redundant attribute guards...", "group": "rule", "color": "#4daf4a", "raw_text": "- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.", "width": 231}, {"id": "rule_Quality_Debugging_90749d0e3a", "name": "- **Defaulting required data**...", "group": "rule", "color": "#4daf4a", "raw_text": "- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "width": 231}]}, {"id": "lbl_Quality_Maintenance", "name": "Maintenance", "group": "label", "color": "#88cb86", "children": [{"id": "rule_Quality_Maintenance_62306fccc6", "name": "### Cleanup Jobs\n\nAlways imple...", "group": "rule", "color": "#88cb86", "raw_text": "### Cleanup Jobs\n\nAlways implement cleanup to remove stale data:\n\n```python\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    \"\"\"\n    Remove nodes that weren't updated in this sync run\n    \"\"\"\n    logger.debug(\"Running Your Service cleanup job\")\n\n    # Cleanup users\n    GraphJob.from_node_schema(YourServiceUserSchema(), common_job_parameters).run(neo4j_session)\n```", "width": 231}, {"id": "rule_Quality_Maintenance_5f0057931f", "name": "Legacy Cartography modules use...", "group": "rule", "color": "#88cb86", "raw_text": "Legacy Cartography modules use handwritten Cypher queries to create nodes and relationships. The modern approach uses declarative data models that automatically generate optimized queries. Refactoring improves maintainability, performance, and consistency.", "width": 231}, {"id": "rule_Quality_Maintenance_44694d928c", "name": "#### Multiple Intel Modules Mo...", "group": "rule", "color": "#88cb86", "raw_text": "#### Multiple Intel Modules Modifying Same Nodes\nWhen refactoring modules that modify the same node type:\n- Use **Simple Relationship Pattern** if only referencing by ID\n- Use **Composite Node Pattern** for different views of the same entity from different data sources (see [Common Patterns](#common-patterns))", "width": 231}]}, {"id": "lbl_Quality_Performance", "name": "Performance", "group": "label", "color": "#bce2bb", "children": [{"id": "rule_Quality_Performance_21d8a68518", "name": "MatchLinks have significant pe...", "group": "rule", "color": "#bce2bb", "raw_text": "MatchLinks have significant performance overhead because they require:\n\n1. **API Call A** \u2192 Write Node A to graph\n2. **API Call B** \u2192 Write Node B to graph\n3. **Read Node A** from graph\n4. **Read Node B** from graph\n5. **Write relationship** between A and B to graph\n\n**Prefer standard node schemas + relationship schemas** whenever possible:", "width": 231}, {"id": "rule_Quality_Performance_2cca8b0bb6", "name": "```python\n# \u274c Problem: Slow qu...", "group": "rule", "color": "#bce2bb", "raw_text": "```python\n# \u274c Problem: Slow queries\n# \u2705 Solution: Add indexes to frequently queried fields\nemail: PropertyRef = PropertyRef(\"email\", extra_index=True)\n\n# \u2705 Query on indexed fields only\nMATCH (u:User {id: $user_id})  # Good - id is always indexed\nMATCH (u:User {name: $name})   # Bad - name might not be indexed\n```", "width": 231}]}, {"id": "lbl_Quality_Security", "name": "Security", "group": "label", "color": "#a8d9a6", "children": [{"id": "rule_Quality_Security_d2960e174e", "name": "**Access Control**: Tenant rel...", "group": "rule", "color": "#a8d9a6", "raw_text": "**Access Control**: Tenant relationships enable proper access control and data isolation", "width": 231}]}]}, {"id": "cat_Build", "name": "Build", "group": "category", "color": "#377EB8", "children": [{"id": "lbl_Build_Conf.&Env.", "name": "Conf.&Env.", "group": "label", "color": "#377eb8", "children": [{"id": "rule_Build_Conf.&Env._405ed53603", "name": "### Adding CLI Arguments\n\nAdd ...", "group": "rule", "color": "#377eb8", "raw_text": "### Adding CLI Arguments\n\nAdd your configuration options in `cartography/cli.py`:\n\n```python\n# In add_auth_args function\nparser.add_argument(\n    '--your-service-api-key-env-var',\n    type=str,\n    help='Name of environment variable containing Your Service API key',\n)\n\nparser.add_argument(\n    '--your-service-tenant-id',\n    type=str,\n    help='Your Service tenant ID',\n)\n```", "width": 231}, {"id": "rule_Build_Conf.&Env._758b496b00", "name": "### Configuration Object\n\nAdd ...", "group": "rule", "color": "#377eb8", "raw_text": "### Configuration Object\n\nAdd fields to `cartography/config.py`:\n\n```python\n@dataclass\nclass Config:\n    # ... existing fields ...\n    your_service_api_key: str | None = None\n    your_service_tenant_id: str | None = None\n```", "width": 231}, {"id": "rule_Build_Conf.&Env._4c8b62beb2", "name": "**Critical Files to Know:**\n- ...", "group": "rule", "color": "#377eb8", "raw_text": "**Critical Files to Know:**\n- `cartography/config.py` - Configuration object definitions\n- `cartography/cli.py` - Command-line argument definitions\n- `cartography/client/core/tx.py` - Core `load()` function\n- `cartography/graph/job.py` - Cleanup job utilities\n- `cartography/models/core/` - Base data model classes", "width": 231}]}, {"id": "lbl_Build_Testing", "name": "Testing", "group": "label", "color": "#377eb8", "children": [{"id": "rule_Build_Testing_e0d1afd6e4", "name": "Create mock data in `tests/dat...", "group": "rule", "color": "#377eb8", "raw_text": "Create mock data in `tests/data/your_service/`:", "width": 231}, {"id": "rule_Build_Testing_806dc980ba", "name": "Test actual Neo4j loading in `...", "group": "rule", "color": "#377eb8", "raw_text": "Test actual Neo4j loading in `tests/integration/cartography/intel/your_service/`:", "width": 231}, {"id": "rule_Build_Testing_1154339282", "name": "- Check for integration tests ...", "group": "rule", "color": "#377eb8", "raw_text": "- Check for integration tests in `tests/integration/cartography/intel/[module]/`\n- The test MUST call the sync function directly (refer to [#testing](#testing))\n- If no test exists, **CREATE IT FIRST** before any refactoring:", "width": 231}]}]}, {"id": "cat_Management", "name": "Management", "group": "category", "color": "#FF7F00", "children": [{"id": "lbl_Management_Development Process", "name": "Development Process", "group": "label", "color": "#ff7f00", "children": [{"id": "rule_Management_Development Process_d96c96cfc4", "name": "Before submitting your module:...", "group": "rule", "color": "#ff7f00", "raw_text": "Before submitting your module:\n\n- [ ] \u2705 **Configuration**: CLI args, config validation, credential handling\n- [ ] \u2705 **Sync Pattern**: get() \u2192 transform() \u2192 load() \u2192 cleanup()\n- [ ] \u2705 **Data Model**: Node properties, relationships, proper typing\n- [ ] \u2705 **Schema Fields**: Only use standard fields in `CartographyRelSchema`/`CartographyNodeSchema` subclasses\n- [ ] \u2705 **Scoped Cleanup**: Verify `scoped_cleanup=True` (default) for tenant-scoped resources, `False` only for global data\n- [ ] \u2705 **Error Handling**: Specific exceptions, required vs optional fields\n- [ ] \u2705 **Testing**: Integration tests for sync functions\n- [ ] \u2705 **Documentation**: Schema docs, docstrings, inline comments\n- [ ] \u2705 **Cleanup**: Proper cleanup job implementation\n- [ ] \u2705 **Indexing**: Extra indexes on frequently queried fields", "width": 231}, {"id": "rule_Management_Development Process_43d746a156", "name": "Before submitting a refactor:\n...", "group":
