*: Use `None` for missing values, not empty strings<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> TRANSFORM: Shaping Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 205 - 207<br><strong>ID:</strong> rule_8\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#984ea3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "details": "\n            - First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Properties<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 240 - 242<br><strong>ID:</strong> rule_9\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#984ea3", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "details": "\n            The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 261 - 261<br><strong>ID:</strong> rule_10\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_86139caa67", "name": "**\u274c Incorrect Examples:**\n- Po...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "details": "\n            **\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 270 - 273<br><strong>ID:</strong> rule_11\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "details": "\n            **DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 378 - 378<br><strong>ID:</strong> rule_12\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "details": "\n            If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 430 - 430<br><strong>ID:</strong> rule_13\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_866af04cd9", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#984ea3", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**", "details": "\n            **\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd17 MatchLinks: Connecting Existing Nodes<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 434 - 434<br><strong>ID:</strong> rule_14\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_c9bc0fa12f", "name": "**Prefer standard node schemas...", "group": "rule", "color": "#984ea3", "raw_text": "**Prefer standard node schemas + relationship schemas** whenever possible:", "details": "\n            **Prefer standard node schemas + relationship schemas** whenever possible:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Performance Impact<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 519 - 519<br><strong>ID:</strong> rule_15\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_b5971618f5", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios", "details": "\n            **\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 533 - 537<br><strong>ID:</strong> rule_16\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_4301eff073", "name": "**\u2705 Use MatchLinks only for:**...", "group": "rule", "color": "#984ea3", "raw_text": "**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "details": "\n            **\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 539 - 541<br><strong>ID:</strong> rule_17\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#984ea3", "raw_text": "Always implement cleanup for MatchLinks:", "details": "\n            Always implement cleanup for MatchLinks:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> MatchLink Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 556 - 556<br><strong>ID:</strong> rule_18\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_e1bb78f60d", "name": "**Semantic Labels (Recommended...", "group": "rule", "color": "#984ea3", "raw_text": "**Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property", "details": "\n            **Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Types of Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 582 - 586<br><strong>ID:</strong> rule_19\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5ee467071", "name": "The `required` parameter in `O...", "group": "rule", "color": "#984ea3", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "details": "\n            The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required Fields<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 668 - 674<br><strong>ID:</strong> rule_20\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_feb8f788a7", "name": "The `eligible_for_source` para...", "group": "rule", "color": "#984ea3", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "details": "\n            The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Eligibility<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 685 - 690<br><strong>ID:</strong> rule_21\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_b02dfffe2d", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:", "details": "\n            Always validate your configuration:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Validation in Module<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 773 - 773<br><strong>ID:</strong> rule_22\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ab37f5bf96", "name": "- When key assumptions your co...", "group": "rule", "color": "#984ea3", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "details": "\n            - When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 793 - 805<br><strong>ID:</strong> rule_23\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6183e7134c", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#984ea3", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "details": "\n            - **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 809 - 814<br><strong>ID:</strong> rule_24\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_38c67b13a7", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#984ea3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:", "details": "\n            Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Date Handling<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 843 - 843<br><strong>ID:</strong> rule_25\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#984ea3", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "details": "\n            **Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 1063 - 1063<br><strong>ID:</strong> rule_26\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#984ea3", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "details": "\n            **Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 1079 - 1079<br><strong>ID:</strong> rule_27\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#984ea3", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "details": "\n            The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 1103 - 1103<br><strong>ID:</strong> rule_28\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#984ea3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "details": "\n            Always document your schema in `docs/schema/your_service.md`:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Schema Documentation<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 1044 - 1044<br><strong>ID:</strong> rule_29\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_eea0a797d1", "name": "Set `scoped_cleanup=False` **O...", "group": "rule", "color": "#984ea3", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "details": "\n            Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f When to Override `scoped_cleanup`<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 349 - 349<br><strong>ID:</strong> rule_30\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d3db1e53e0", "name": "**Examples where `scoped_clean...", "group": "rule", "color": "#984ea3", "raw_text": "**Examples where `scoped_cleanup=False` makes sense:**\n- Vulnerability databases (CVE data is global)\n- Threat intelligence feeds (IOCs are not tenant-specific)\n- Public certificate transparency logs\n- Global DNS/domain information", "details": "\n            **Examples where `scoped_cleanup=False` makes sense:**\n- Vulnerability databases (CVE data is global)\n- Threat intelligence feeds (IOCs are not tenant-specific)\n- Public certificate transparency logs\n- Global DNS/domain information<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f When to Override `scoped_cleanup`<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 360 - 364<br><strong>ID:</strong> rule_31\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_a991ace1dd", "name": "**Default behavior (`scoped_cl...", "group": "rule", "color": "#984ea3", "raw_text": "**Default behavior (`scoped_cleanup=True`) is correct for:**\n- User accounts (scoped to organization/tenant)\n- Infrastructure resources (scoped to AWS account, Azure subscription, etc.)\n- Application assets (scoped to company/tenant)", "details": "\n            **Default behavior (`scoped_cleanup=True`) is correct for:**\n- User accounts (scoped to organization/tenant)\n- Infrastructure resources (scoped to AWS account, Azure subscription, etc.)\n- Application assets (scoped to company/tenant)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f When to Override `scoped_cleanup`<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 366 - 369<br><strong>ID:</strong> rule_32\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass", "details": "\n            **Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 415 - 420<br><strong>ID:</strong> rule_36\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_89f576516a", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "details": "\n            **Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 422 - 428<br><strong>ID:</strong> rule_37\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Implementation_Architecture", "name": "Architecture", "group": "label", "color": "#dabcdf", "details": "Label: Architecture<br>Total Rules: 6<br>Code Ratio: 0.67<br>FRE Cognitive Load: 19.8", "children": [{"id": "rule_Implementation_Architecture_9a2ee2cfcc", "name": "Every Cartography intel module...", "group": "rule", "color": "#dabcdf", "raw_text": "Every Cartography intel module follows this structure:", "details": "\n            Every Cartography intel module follows this structure:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83c\udfd7\ufe0f Module Structure Overview<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 72 - 72<br><strong>ID:</strong> rule_50\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_ac2e00ef69", "name": "The Ontology system works in t...", "group": "rule", "color": "#dabcdf", "raw_text": "The Ontology system works in two ways:\n1. **Semantic Labels**: Adds semantic labels (like `UserAccount`) and prefixed properties (`_ont_*`) directly to source nodes for cross-module querying during ingestion\n2. **Canonical Nodes**: Creates canonical node (like `(:User:Ontology)`) that represent unified entities", "details": "\n            The Ontology system works in two ways:\n1. **Semantic Labels**: Adds semantic labels (like `UserAccount`) and prefixed properties (`_ont_*`) directly to source nodes for cross-module querying during ingestion\n2. **Canonical Nodes**: Creates canonical node (like `(:User:Ontology)`) that represent unified entities<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Overview of Ontology System<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 573 - 576<br><strong>ID:</strong> rule_51\n            </small>\n - Multiple modules that seem interdependent", "details": "\n            ### \ud83d\uded1 When to Stop and Ask\n\nRefactors can be complex. **Stop and ask the user** if you encounter:\n- Unclear business logic in legacy Cypher\n- Complex relationships that don't map clearly to data model\n- Test failures you can't resolve\n- Multiple modules that seem interdependent<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd04 Refactoring Legacy Code to Data Model<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 757 - 763<br><strong>ID:</strong> rule_4\n            </small>\n            ", "width": 231}, {"id": "rule_General_AI Integration_af6e38b7bd", "name": "1. **Check existing patterns f...", "group": "rule", "color": "#e31a1b", "raw_text": "1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)", "details": "\n            1. **Check existing patterns first**: Look at similar modules in `cartography/intel/` before creating new patterns\n2. **Verify data model imports**: Ensure all `CartographyNodeSchema` imports are correct\n3. **Test transform functions**: Always test data transformation logic with real API responses\n4. **Validate Neo4j queries**: Use Neo4j browser to test queries manually if relationships aren't working\n5. **Check file naming**: Module files should match the service name (e.g., `cartography/intel/lastpass/users.py`)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Debugging Tips for AI Assistants<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 893 - 897<br><strong>ID:</strong> rule_5\n            </small>\n            ", "width": 231}, {"id": "rule_General_AI Integration_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#e31a1b", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "details": "\n            **Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83e\uddea Testing Your Module<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 484 - 487<br><strong>ID:</strong> rule_6\n            </small>\n            ", "width": 231}]}, {"id": "lbl_General_Documentation", "name": "Documentation", "group": "label", "color": "#f5aaaa", "details": "Label: Documentation<br>Total Rules: 2<br>Code Ratio: 1.0<br>FRE Cognitive Load: 0.0", "children": [{"id": "rule_General_Documentation_0dd592f7fa", "name": "- **Simple module**: `cartogra...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`", "details": "\n            - **Simple module**: `cartography/intel/lastpass/` - Basic user sync with API calls\n- **Complex module**: `cartography/intel/aws/ec2/instances.py` - Multiple relationships and data types\n- **Reference documentation**: `docs/root/dev/writing-intel-modules.md`<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\ude80 Quick Start: Copy an Existing Module<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 37 - 39<br><strong>ID:</strong> rule_57\n            </small>\n            ", "width": 231}, {"id": "rule_General_Documentation_c4ae948352", "name": "- **Logs**: Look for import er...", "group": "rule", "color": "#f5aaaa", "raw_text": "- **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior", "details": "\n            - **Logs**: Look for import errors in application logs\n- **Tests**: Check `tests/integration/cartography/intel/` for similar patterns\n- **Models**: Review `cartography/models/` for existing relationship patterns\n- **Core**: Understand `cartography/client/core/tx.py` for load function behavior<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Key Files for Debugging<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 900 - 903<br><strong>ID:</strong> rule_58\n            </small>\n            ", "width": 231}]}]}, {"id": "cat_Implementation", "name": "Implementation", "group": "category", "color": "#984EA3", "details": "Category: Implementation<br>Total Labels: 3<br>Total Rules: 38<br>Code Ratio: 0.63", "children": [{"id": "lbl_Implementation_Architecture", "name": "Architecture", "group": "label", "color": "#994ea4", "details": "Label: Architecture<br>Total Rules: 8<br>Code Ratio: 0.62<br>FRE Cognitive Load: 26.9", "children": [{"id": "rule_Implementation_Architecture_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#994ea4", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "details": "\n            The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 222 - 224<br><strong>ID:</strong> rule_7\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_7558c90296", "name": "**\u2705 Correct Examples:**\n- **AW...", "group": "rule", "color": "#994ea4", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "details": "\n            **\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 226 - 237<br><strong>ID:</strong> rule_8\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_dc72f409a3", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#994ea4", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "details": "\n            **\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd17 MatchLinks: Connecting Existing Nodes<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 330 - 333<br><strong>ID:</strong> rule_9\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_c9bc0fa12f", "name": "**Prefer standard node schemas...", "group": "rule", "color": "#994ea4", "raw_text": "**Prefer standard node schemas + relationship schemas** whenever possible:", "details": "\n            **Prefer standard node schemas + relationship schemas** whenever possible:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Performance Impact<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 393 - 393<br><strong>ID:</strong> rule_10\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_e3a7dad624", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#994ea4", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "details": "\n            **\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 408 - 416<br><strong>ID:</strong> rule_11\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#994ea4", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "details": "\n            **Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 820 - 822<br><strong>ID:</strong> rule_12\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#994ea4", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "details": "\n            **Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 836 - 838<br><strong>ID:</strong> rule_13\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#994ea4", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "details": "\n            The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 860 - 860<br><strong>ID:</strong> rule_14\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#984ea3", "details": "Label: Impl. Details<br>Total Rules: 28<br>Code Ratio: 0.62<br>FRE Cognitive Load: 25.7", "children": [{"id": "rule_Implementation_Impl. Details_b498b122d6", "name": "Every sync function follows th...", "group": "rule", "color": "#984ea3", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "details": "\n            Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd04 The Sync Pattern: Get, Transform, Load, Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 88 - 113<br><strong>ID:</strong> rule_15\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba8fa505d6", "name": "1. **Minimal Error Handling**:...", "group": "rule", "color": "#984ea3", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "details": "\n            1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 133 - 133<br><strong>ID:</strong> rule_16\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_aa82198b92", "name": "2. **Use Decorators**: For AWS...", "group": "rule", "color": "#984ea3", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "details": "\n            2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 145 - 145<br><strong>ID:</strong> rule_17\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d02bceaf0e", "name": "3. **Fail Loudly**: If an erro...", "group": "rule", "color": "#984ea3", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "details": "\n            3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 152 - 152<br><strong>ID:</strong> rule_18\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_64ff8649be", "name": "4. **Timeout Configuration**: ...", "group": "rule", "color": "#984ea3", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "details": "\n            4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 161 - 161<br><strong>ID:</strong> rule_19\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_8782cb0a0f", "name": "- **Required fields**: Use `da...", "group": "rule", "color": "#984ea3", "raw_text": "- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "details": "\n            - **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> TRANSFORM: Shaping Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 186 - 188<br><strong>ID:</strong> rule_20\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#984ea3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "details": "\n            - First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Properties<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 213 - 215<br><strong>ID:</strong> rule_21\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "details": "\n            **The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd17 One-to-Many Relationships<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 313 - 313<br><strong>ID:</strong> rule_22\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "details": "\n            **DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 317 - 319<br><strong>ID:</strong> rule_23\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "details": "\n            If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 374 - 374<br><strong>ID:</strong> rule_24\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_43e92044df", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#984ea3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "details": "\n            All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required MatchLink Properties<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 418 - 430<br><strong>ID:</strong> rule_25\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#984ea3", "raw_text": "Always implement cleanup for MatchLinks:", "details": "\n            Always implement cleanup for MatchLinks:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> MatchLink Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 432 - 432<br><strong>ID:</strong> rule_26\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5ee467071", "name": "The `required` parameter in `O...", "group": "rule", "color": "#984ea3", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "details": "\n            The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Step 3: Understanding Ontology Field Mappings<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 548 - 554<br><strong>ID:</strong> rule_27\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_feb8f788a7", "name": "The `eligible_for_source` para...", "group": "rule", "color": "#984ea3", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "details": "\n            The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Eligibility<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 563 - 568<br><strong>ID:</strong> rule_28\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_e35f931bb9", "name": "#### 1. Choose the Right Prima...", "group": "rule", "color": "#984ea3", "raw_text": "#### 1. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`", "details": "\n            #### 1. Choose the Right Primary Identifier and Mark as Required\n- **Users**: Use `email` as the primary identifier when available (most reliable across systems) and mark as `required=True`\n- **Devices**: Use `hostname` as the primary identifier when available and mark as `required=True`<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 614 - 617<br><strong>ID:</strong> rule_29\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6b95b26dc6", "name": "#### 2. Use Required Fields St...", "group": "rule", "color": "#984ea3", "raw_text": "#### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing", "details": "\n            #### 2. Use Required Fields Strategically\n- **Mark as required**: Only fields that are absolutely essential for the ontology node to be useful\n- **Leave optional**: Fields that provide additional context but aren't essential\n- **Consider impact**: Required fields filter out entire records if missing<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Best Practices for Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 623 - 626<br><strong>ID:</strong> rule_30\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_610d6ab52b", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```", "details": "\n            Always validate your configuration:\n\n```python\ndef start_your_service_ingestion(neo4j_session: neo4j.Session, config: Config) -> None:\n    # Validate required configuration\n    if not config.your_service_api_key:\n        logger.info(\"Your Service API key not configured - skipping module\")\n        return\n\n    if not config.your_service_tenant_id:\n        logger.info(\"Your Service tenant ID not configured - skipping module\")\n        return\n\n    # Get API key from environment\n    api_key = os.getenv(config.your_service_api_key)\n    if not api_key:\n        logger.error(f\"Environment variable {config.your_service_api_key} not set\")\n        return\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Validation in Module<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 672 - 690<br><strong>ID:</strong> rule_31\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ab37f5bf96", "name": "- When key assumptions your co...", "group": "rule", "color": "#984ea3", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "details": "\n            - When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 697 - 709<br><strong>ID:</strong> rule_32\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6183e7134c", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#984ea3", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "details": "\n            - **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 713 - 718<br><strong>ID:</strong> rule_33\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ba072382e3", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#984ea3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:\n\n```python\n# \u274c DON'T: Manually parse dates or convert to epoch timestamps\n\"created_at\": int(dt_parse.parse(user_data[\"created_at\"]).timestamp() * 1000)\n\"last_login\": dict_date_to_epoch({\"d\": dt_parse.parse(data[\"last_login\"])}, \"d\")\n\n# \u2705 DO: Pass datetime values directly\n\"created_at\": user_data.get(\"created_at\")  # AWS/API returns ISO 8601 dates\n\"last_login\": user_data.get(\"last_login\")  # Neo4j handles these natively\n```", "details": "\n            Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:\n\n```python\n# \u274c DON'T: Manually parse dates or convert to epoch timestamps\n\"created_at\": int(dt_parse.parse(user_data[\"created_at\"]).timestamp() * 1000)\n\"last_login\": dict_date_to_epoch({\"d\": dt_parse.parse(data[\"last_login\"])}, \"d\")\n\n# \u2705 DO: Pass datetime values directly\n\"created_at\": user_data.get(\"created_at\")  # AWS/API returns ISO 8601 dates\n\"last_login\": user_data.get(\"last_login\")  # Neo4j handles these natively\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Date Handling<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 737 - 747<br><strong>ID:</strong> rule_34\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_451fea0416", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#984ea3", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "details": "\n            **What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 543 - 550<br><strong>ID:</strong> rule_35\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_36de71c72a", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#984ea3", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "details": : Cleanup Legacy Files<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 739 - 746<br><strong>ID:</strong> rule_60\n            </small>\n            ", "width": 231}]}]}]}, "index": 4}, {"commit": "b7b70aa8c9c59a8524544603d61be9819a2141c9", "tree": {"id": "root", "name": "cartography-cncf/cartography - AGENTS.md", "group": "root", "color": "#1e293b", "details": "Repository Name: cartography-cncf/cartography - AGENTS.md", "children": [{"id": "cat_General", "name": "General", "group": "category", "color": "#E41A1C", "details": "Category: General<br>Total Labels: 2<br>Total Rules: 8<br>Code Ratio: 0.38", "children": [{"id": "lbl_General_AI Integration", "name": "AI Integration", "group": "label", "color": "#e31a1b", "details": "Label: AI Integration<br>Total Rules: 6<br>Code Ratio: 0.17<br>FRE Cognitive Load: 19.1", "children": [{"id": "rule_General_AI Integration_23aa54421b", "name": "**For AI Coding Assistants**: ...", "group": "rule", "color": "#e31a1b", "raw_text": "**For AI Coding Assistants**: This document provides comprehensive guidance for understanding and developing Cartography intel modules. It contains codebase-specific patterns, architectural decisions, and implementation details necessary for effective AI-assisted development within the Cartography project.", "details": "\n            **For AI Coding Assistants**: This document provides comprehensive guidance for understanding and developing Cartography intel modules. It contains codebase-specific patterns, architectural decisions, and implementation details necessary for effective AI-assisted development within the Cartography project.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> AGENTS.md: Cartography Intel Module Development Guide<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 3 - 3<br><strong>ID:</strong> rule_1\n            </small>\n            ", "width": 231},
