anup Patterns\n\n```python\ndef load_entities(neo4j_session: neo4j.Session, data: list[dict],\n                 tenant_id: str, update_tag: int) -> None:\n    load(neo4j_session, YourSchema(), data,\n         lastupdated=update_tag, TENANT_ID=tenant_id)\n\ndef cleanup(neo4j_session: neo4j.Session, common_job_parameters: dict[str, Any]) -> None:\n    logger.debug(\"Running cleanup job for MyResource\")\n    GraphJob.from_node_schema(YourSchema(), common_job_parameters).run(neo4j_session)\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Quick Reference Cheat Sheet<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 126 - 136<br><strong>ID:</strong> rule_17\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f5b33e922b", "name": "### File Structure Template\n\n`...", "group": "rule", "color": "#984ea3", "raw_text": "### File Structure Template\n\n```\ncartography/intel/your_service/\n\u251c\u2500\u2500 __init__.py          # Main entry point\n\u2514\u2500\u2500 entities.py          # Domain sync modules\n\ncartography/models/your_service/\n\u251c\u2500\u2500 entity.py            # Data model definitions\n\u2514\u2500\u2500 tenant.py            # Tenant model\n\ntests/data/your_service/\n\u2514\u2500\u2500 entities.py          # Mock test data\n\ntests/integration/cartography/intel/your_service/\n\u2514\u2500\u2500 test_entities.py     # Integration tests\n```", "details": "\n            ### File Structure Template\n\n```\ncartography/intel/your_service/\n\u251c\u2500\u2500 __init__.py          # Main entry point\n\u2514\u2500\u2500 entities.py          # Domain sync modules\n\ncartography/models/your_service/\n\u251c\u2500\u2500 entity.py            # Data model definitions\n\u2514\u2500\u2500 tenant.py            # Tenant model\n\ntests/data/your_service/\n\u2514\u2500\u2500 entities.py          # Mock test data\n\ntests/integration/car ", "details": "Label: Architecture<br>Total Rules: 8<br>Code Ratio: 0.75<br>FRE Cognitive Load: 19.1", "children": [{"id": "rule_Implementation_Architecture_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#984ea3", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "details": "\n            The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 222 - 224<br><strong>ID:</strong> rule_7\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_7558c90296", "name": "**\u2705 Correct Examples:**\n- **AW...", "group": "rule", "color": "#984ea3", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "details": "\n            **\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)\n\n**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 226 - 237<br><strong>ID:</strong> rule_8\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_dc72f409a3", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#984ea3", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "details": "\n            **\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd17 MatchLinks: Connecting Existing Nodes<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 340 - 343<br><strong>ID:</strong> rule_9\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_e3a7dad624", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "details": "\n            **\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios\n\n**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 408 - 416<br><strong>ID:</strong> rule_10\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#984ea3", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "details": "\n            **Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 793 - 795<br><strong>ID:</strong> rule_11\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#984ea3", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "details": "\n            **Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 808 - 812<br><strong>ID:</strong> rule_12\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#984ea3", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "details": "\n            The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 831 - 831<br><strong>ID:</strong> rule_13\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_028ce0bb90", "name": "**Semantic Labels (Recommended...", "group": "rule", "color": "#984ea3", "raw_text": "**Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property\n\n**Canonical Nodes (Legacy)**: Creates separate abstract `User`/`Device` nodes:\n- \u26a0\ufe0f More complex - requires separate node creation and relationship management\n- \u26a0\ufe0f Additional storage overhead\n- \u2705 Useful when you need to aggregate data from multiple sources into single entities", "details": "\n            **Semantic Labels (Recommended)**: Adds `UserAccount` labels and `_ont_*` properties to existing nodes:\n- \u2705 Simpler implementation - no additional node creation\n- \u2705 Direct querying of source nodes with normalized properties\n- \u2705 Automatic property mapping with special handling for data transformations\n- \u2705 Source tracking via `_ont_source` property\n\n**Canonical Nodes (Legacy)**: Creates separate abstract `User`/`Device` nodes:\n- \u26a0\ufe0f More complex - requires separate node creation and relationship management\n- \u26a0\ufe0f Additional storage overhead\n- \u2705 Useful when you need to aggregate data from multiple sources into single entities<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Types of Ontology Integration<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 449 - 459<br><strong>ID:</strong> rule_14\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#dabcdf", "details": "Label: Impl. Details<br>Total Rules: 22<br>Code Ratio: 0.77<br>FRE Cognitive Load: 24.1", "children": [{"id": "rule_Implementation_Impl. Details_ba8fa505d6", "name": "1. **Minimal Error Handling**:...", "group": "rule", "color": "#dabcdf", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "details": "\n            1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 113 - 113<br><strong>ID:</strong> rule_15\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_aa82198b92", "name": "2. **Use Decorators**: For AWS...", "group": "rule", "color": "#dabcdf", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "details": "\n            2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 127 - 127<br><strong>ID:</strong> rule_16\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d02bceaf0e", "name": "3. **Fail Loudly**: If an erro...", "group": "rule", "color": "#dabcdf", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "details": "\n            3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 134 - 134<br><strong>ID:</strong> rule_17\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_64ff8649be", "name": "4. **Timeout Configuration**: ...", "group": "rule", "color": "#dabcdf", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "details": "\n            4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 143 - 143<br><strong>ID:</strong> rule_18\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_8782cb0a0f", "name": "- **Required fields**: Use `da...", "group": "rule", "color": "#dabcdf", "raw_text": "- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "details": "\n            - **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> TRANSFORM: Shaping Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 172 - 174<br><strong>ID:</strong> rule_19\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#dabcdf", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "details": "\n            - First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Properties<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 199 - 201<br><strong>ID:</strong> rule_20\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#dabcdf", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "details": "\n            **DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 316 - 318<br><strong>ID:</strong> rule_21\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#dabcdf", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "details": "\n            If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 380 - 380<br><strong>ID:</strong> rule_22\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_43e92044df", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#dabcdf", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "details": "\n            All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required MatchLink Properties<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 418 - 430<br><strong>ID:</strong> rule_23\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#dabcdf", "raw_text": "Always implement cleanup for MatchLinks:", "details": "\n            Always implement cleanup for MatchLinks:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> MatchLink Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 432 - 432<br><strong>ID:</strong> rule_24\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d5ee467071", "name": "The `required` parameter in `O...", "group": "rule", "color": "#dabcdf", "raw_text": "The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.", "details": "\n            The `required` parameter in `OntologyFieldMapping` serves two critical purposes:\n\n**1. Data Quality Control**: When `required=True`, source nodes that lack this field (i.e., the field is `None` or missing) will be completely excluded from ontology node creation. This ensures only complete, usable data creates ontology nodes.\n\n**2. Primary Identifier Validation**: Fields used as primary identifiers **must** be marked as required to ensure ontology nodes can always be properly identified and matched across data sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required Fields<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 543 - 549<br><strong>ID:</strong> rule_25\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_feb8f788a7", "name": "The `eligible_for_source` para...", "group": "rule", "color": "#dabcdf", "raw_text": "The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation", "details": "\n            The `eligible_for_source` parameter in `OntologyNodeMapping` controls whether this node mapping can create new ontology nodes (default: `True`).\n\n**When to set `eligible_for_source=False`:**\n- Node type lacks sufficient data to create meaningful ontology nodes (e.g., no email for Users)\n- Node serves only as a connection point to existing ontology nodes\n- Required fields are not available or reliable enough for primary node creation<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Eligibility<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 558 - 563<br><strong>ID:</strong> rule_26\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_ab37f5bf96", "name": "- When key assumptions your co...", "group": "rule", "color": "#dabcdf", "raw_text": "- When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.", "details": "\n            - When key assumptions your code relies upon stop being true, **stop execution immediately** and let\n  the error propagate. Add context if needed, then re-raise, rather than swallowing or downgrading\n  the exception.\n- Lean toward propagating errors up to callers instead of logging a warning inside a `try`/`except`\n  block and continuing. Every time we continue execution after an unexpected error we risk silently\n  corrupting downstream data.\n- If you're confident data should always exist, access it directly. Allow natural `KeyError`,\n  `AttributeError`, or `IndexError` exceptions to signal corruption instead of building extra guard\n  rails or default placeholders.\n- Avoid using `hasattr()`/`getattr()` (or language equivalents) to probe for attributes that our\n  schemas guarantee. These checks often hide real contract violations and make debugging harder.\n- Never manufacture \"safe\" default return values for dictionary keys, tuple indices, or other\n  required data. Emit the real exception so the upstream issue can be fixed.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 582 - 594<br><strong>ID:</strong> rule_27\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_6183e7134c", "name": "- **Harmful try/except blocks*...", "group": "rule", "color": "#dabcdf", "raw_text": "- **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.", "details": "\n            - **Harmful try/except blocks** \u2192 Only catch exceptions when you can remediate them meaningfully.\n  Otherwise, let them bubble up and fail fast.\n- **Redundant attribute guards** \u2192 Remove `hasattr()`/`getattr()` shims for required fields and rely\n  on our strongly-defined schemas and tests to detect breakage.\n- **Defaulting required data** \u2192 Do not set fallback values for required dictionary keys or sequence\n  indices. Allow the error to surface so the caller can address it.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udea8 Error Handling<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 596 - 601<br><strong>ID:</strong> rule_28\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_38c67b13a7", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#dabcdf", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:", "details": "\n            Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Date Handling<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 621 - 621<br><strong>ID:</strong> rule_29\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_eea0a797d1", "name": "Set `scoped_cleanup=False` **O...", "group": "rule", "color": "#dabcdf", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "details": "\n            Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f When to Override `scoped_cleanup`<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 296 - 296<br><strong>ID:</strong> rule_30\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_32a83c96ee", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#dabcdf", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass\n\n**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "details": "\n            **Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass\n\n**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 363 - 378<br><strong>ID:</strong> rule_31\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#dabcdf", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "details": "\n            Always document your schema in `docs/schema/your_service.md`:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Schema Documentation<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 779 - 779<br><strong>ID:</strong> rule_32\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#dabcdf", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "details": "\n            **The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Define One-to-Many Relationship<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 314 - 314<br><strong>ID:</strong> rule_33\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1514b39644", "name": "#### 3a. Remove Index Entries\n...", "group": "rule", "color": "#dabcdf", "raw_text": "#### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.", "details": "\n            #### 3a. Remove Index Entries\nRemove manual index entries from `cartography/data/indexes.cypher`:\n\n```cypher\n# Remove entries like these - data model creates indexes automatically\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.id);\nCREATE INDEX IF NOT EXISTS FOR (n:EC2Instance) ON (n.lastupdated);\n```\n\n**Note**: Only remove indexes for nodes you've converted to data model. Leave others untouched.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83e\uddf9 Step 3: Cleanup Legacy Files<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 700 - 709<br><strong>ID:</strong> rule_34\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_a2e77c011a", "name": "#### 3b. Remove Cleanup Job Fi...", "group": "rule", "color": "#dabcdf", "raw_text": "#### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.", "details": "\n            #### 3b. Remove Cleanup Job Files\nRemove corresponding cleanup JSON files from `cartography/data/jobs/cleanup/`:\n\n```bash\n# Remove files like:\nrm cartography/data/jobs/cleanup/aws_import_ec2_instances_cleanup.json\n```\n\n**Note**: Only remove cleanup files for modules you've fully converted.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83e\uddf9 Step 3: Cleanup Legacy Files<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 711 - 719<br><strong>ID:</strong> rule_35\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_bf58454db6", "name": "### \ud83d\udeab What NOT to Test\n\n**Do N...", "group": "rule", "color": "#dabcdf", "raw_text": "### \ud83d\udeab What NOT to Test\n\n**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior", "details": "\n            ### \ud83d\udeab What NOT to Test\n\n**Do NOT explicitly test cleanup functions** unless there's a specific concern:\n- Data model handles complex cleanup cases automatically\n- Testing cleanup adds unnecessary boilerplate\n- Focus tests on data ingestion, not cleanup behavior<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udeab What NOT to Test<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 743 - 748<br><strong>ID:</strong> rule_36\n            </small>\n            ", "width": 231}]}]}, {"id": "cat_Build", "name": "Build", "group": "category", "color": "#377EB8", "details": "Category: Build<br>Total Labels: 2<br>Total Rules: 13<br>Code Ratio: 0.46", "children": [{"id": "lbl_Build_Testing", "name": "Testing", "group": "label", "color": "#377eb8", "details": "Label: Testing<br>Total Rules: 10<br>Code Ratio: 0.4<br>FRE Cognitive Load: 14.1", "children": [{"id": "rule_Build_Testing_29ebd4746b", "name": "Unit tests are only for testin...", "group": "rule", "color": "#377eb8", "raw_text": "Unit tests are only for testing smaller functions and verifying that the outputs are as expected.", "details": "\n            Unit tests are only for testing smaller functions and verifying that the outputs are as expected.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Unit Tests<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 497 - 497<br><strong>ID:</strong> rule_37\n            </small>\n            ", "width": 231}, {"id": "rule_Build_Testing_29f60d5a91", "name": "**Key Principle: Test outcomes...", "group": "rule", "color": "#377eb8", "raw_text": "**Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.", "details": "\n            **Key Principle: Test outcomes, not implementation details.**\n\nFocus on verifying that data is written to the graph as expected, rather than testing internal function parameters or implementation details. Mock external dependencies (APIs, databases) when necessary, but avoid brittle parameter testing.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 501 - 504<br><strong>ID:</strong> rule_38\n            </small>\n            ", "width": 231}, {"id": "rule_Build_Testing_451fea0416", "name": "**What to Test:**\n- \u2705 **Outcom...", "group": "rule", "color": "#377eb8", "raw_text": "**What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary", "details": "\n            **What to Test:**\n- \u2705 **Outcomes**: Nodes created with correct properties\n- \u2705 **Outcomes**: Relationships created between expected nodes\n\n**What NOT to Test:**\n- \u274c **Implementation**: Function parameters passed to mocks (brittle!)\n- \u274c **Implementation**: Internal function call order\n- \u274c **Implementation**: Mock call counts unless absolutely necessary<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 548 - 555<br><strong>ID:</strong> rule_39\n            </small>\n            ", "width": 231}, {"id": "rule_Build_Testing_36de71c72a", "name": "**When to Mock:**\n- \u2705 External...", "group": "rule", "color": "#377eb8", "raw_text": "**When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested", "details": "\n            **When to Mock:**\n- \u2705 External APIs (AWS, Azure, third-party services) - provide test data\n- \u2705 Database connections - avoid real connections\n- \u2705 Network calls - avoid real network requests\n\n**When NOT to Mock:**\n- \u274c Internal Cartography functions\n- \u274c Data transformation logic\n- \u274c The function that is being tested<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Integration Tests<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 557 - 565<br><strong>ID:</strong> rule_40\n            </small>\n            ", "width": 231}, {"id": "rule_Build_Testing_1154339282", "name": "- Check for integration tests ...", "group": "rule", "color": "#377eb8", "raw_text": "- Check for integration tests in `tests/integration/cartography/intel/[module]/`\n- The test MUST call t ur code:", "details": "\n            Use Python 3.9+ style type hints throughout your code:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Type Hints Style Guide<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 882 - 882<br><strong>ID:</strong> rule_50\n            </small>\n            ", "width": 231}, {"id": "rule_Management_Development Process_b498b122d6", "name": "Every sync function follows th...", "group": "rule", "color": "#ff7f00", "raw_text": "Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```", "details": "\n            Every sync function follows this exact pattern:\n\n```python\n@timeit\ndef sync(\n    neo4j_session: neo4j.Session,\n    api_key: str,\n    tenant_id: str,\n    update_tag: int,\n    common_job_parameters: dict[str, Any],\n) -> None:\n    \"\"\"\n    Sync function following the standard pattern\n    \"\"\"\n    # 1. GET - Fetch data from API\n    raw_data = get(api_key, tenant_id)\n\n    # 2. TRANSFORM - Shape data for ingestion\n    transformed_data = transform(raw_data)\n\n    # 3. LOAD - Ingest to Neo4j using data model\n    load_users(neo4j_session, transformed_data, tenant_id, update_tag)\n\n    # 4. CLEANUP - Remove stale data\n    cleanup(neo4j_session, common_job_parameters)\n```<br><br>\n            <hr>\n ints:**\n- **Inherit from `Finding`**: Your model must extend the base class\n- **Match Query Aliases**: Field names must match `cypher_query` aliases\n- **Automatic Handling**: The `source` field is auto-populated with module name", "details": "\n            Each Rule must define an output model extending `Finding`:\n\n```python\nfrom cartography.rules.spec.model import Finding\n\nclass MyRuleOutput(Finding):\n    \"\"\"Output model for my custom rule.\"\"\"\n\n    # Define fields that will be populated from cypher_query results\n    id: str | None = None              # Resource identifier\n    email: str | None = None           # User email\n    region: str | None = None          # Cloud region\n    public_access: bool | None = None  # Access level\n```\n\n**Key Points:**\n- **Inherit from `Finding`**: Your model must extend the base class\n- **Match Query Aliases**: Field names must match `cypher_query` aliases\n- **Automatic Handling**: The `source` field is auto-populated with module name<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Output Models with Pydantic<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 416 - 433<br><strong>ID:</strong> rule_61\n            </small>\n            ", "width": 231}, {"id": "rule_Quality_Security_275553858c", "name": "Use semantic versioning for ru...", "group": "rule", "color": "#bce2bb", "raw_text": "Use semantic versioning for rules:\n\n```python\nversion=\"0.1.0\"  # Initial release\nversion=\"0.2.0\"  # Added new facts (minor)\nversion=\"0.2.1\"  # Bug fix (patch)\nversion=\"1.0.0\"  # Production ready (major)\n```", "details": "\n            Use semantic versioning for rules:\n\n```python\nversion=\"0.1.0\"  # Initial release\nversion=\"0.2.0\"  # Added new facts (minor)\nversion=\"0.2.1\"  # Bug fix (patch)\nversion=\"1.0.0\"  # Production ready (major)\n```<br><br>\n            <hr>\n            <small>\n            <strong>Ori k Reference<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 18 - 18<br><strong>ID:</strong> rule_9\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_6cd21cd4f0", "name": "**Update Tag**: Timestamp used...", "group": "rule", "color": "#dabcdf", "raw_text": "**Update Tag**: Timestamp used for cleanup jobs to remove stale data", "details": "\n            **Update Tag**: Timestamp used for cleanup jobs to remove stale data<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83e\udd16 AI Assistant Quick Reference<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 19 - 19<br><strong>ID:</strong> rule_10\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_c02a8b9603", "name": "The `sub_resource_relationship...", "group": "rule", "color": "#dabcdf", "raw_text": "The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.", "details": "\n            The `sub_resource_relationship` should **always** refer to a tenant-like object that represents the ownership or organizational boundary of the resource. This is crucial for proper data organization and cleanup operations.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 228 - 228<br><strong>ID:</strong> rule_11\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_f553f2b4eb", "name": "**Why This Matters:**\n1. **Cle...", "group": "rule", "color": "#dabcdf", "raw_text": "**Why This Matters:**\n1. **Cleanup Operations**: Cartography uses the sub-resource relationship to determine which data to clean up during sync operations\n2. **Data Organization**: Tenant-like objects provide natural boundaries for data organization\n3. **Access Control**: Tenant relationships enable proper access control and data isolation\n4. **Consistency**: Following this pattern ensures consistent data modeling across all modules", "details": "\n            **Why This Matters:**\n1. **Cleanup Operations**: Cartography uses the sub-resource relationship to determine which data to clean up during sync operations\n2. **Data Organization**: Tenant-like objects provide natural boundaries for data organization\n3. **Access Control**: Tenant relationships enable proper access control and data isolation\n4. **Consistency**: Following this pattern ensures consistent data modeling across all modules<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 278 - 283<br><strong>ID:</strong> rule_12\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_1a76612300", "name": "**Simple Relationship Pattern*...", "group": "rule", "color": "#dabcdf", "raw_text": "**Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.", "details": "\n            **Simple Relationship Pattern**: When data type A only refers to data type B by an ID without providing additional properties about B, we can just define a relationship schema. This way when A is loaded, the relationship schema performs a `MATCH` to find and connect to existing nodes of type B.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 638 - 638<br><strong>ID:</strong> rule_13\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_95cc4ae224", "name": "**Composite Node Pattern**: Wh...", "group": "rule", "color": "#dabcdf", "raw_text": "**Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.", "details": "\n            **Composite Node Pattern**: When a data type A refers to another data type B and offers additional fields about B that B doesn't have itself, we should define a composite node schema. This composite node would be named \"`BASchema`\" to denote that it's a \"`B`\" object as known by an \"`A`\" object. When loaded, the composite node schema targets the same node label as the primary `B` schema, allowing the loading system to perform a `MERGE` operation that combines properties from both sources.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 642 - 642<br><strong>ID:</strong> rule_14\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_10231f9391", "name": "The key distinction is whether...", "group": "rule", "color": "#dabcdf", "raw_text": "The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.", "details": "\n            The key distinction is whether the referring module provides additional properties about the target entity. If it does, use a composite node schema. If it only provides IDs, use a simple relationship schema.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Multiple Intel Modules Modifying the Same Node Type<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 672 - 672<br><strong>ID:</strong> rule_15\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Architecture_dc72f409a3", "name": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks...", "group": "rule", "color": "#dabcdf", "raw_text": "**\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:", "details": "\n            **\u26a0\ufe0f IMPORTANT: Use MatchLinks sparingly due to performance impact!**\n\nMatchLinks are a specialized tool for creating relationships between existing nodes in the graph. They should be used **only** in these two specific scenarios:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \ud83d\udd17 MatchLinks: Connecting Existing Nodes<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 388 - 390<br><strong>ID:</strong> rule_16\n            </small>\n            ", "width": 231}]}, {"id": "lbl_Implementation_Impl. Details", "name": "Impl. Details", "group": "label", "color": "#984ea3", "details": "Label: Impl. Details<br>Total Rules: 34<br>Code Ratio: 0.71<br>FRE Cognitive Load: 9.2", "children": [{"id": "rule_Implementation_Impl. Details_ba8fa505d6", "name": "1. **Minimal Error Handling**:...", "group": "rule", "color": "#984ea3", "raw_text": "1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.", "details": "\n            1. **Minimal Error Handling**: Avoid adding try/except blocks in `get()` functions. Let errors propagate up to the caller.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 115 - 115<br><strong>ID:</strong> rule_17\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_aa82198b92", "name": "2. **Use Decorators**: For AWS...", "group": "rule", "color": "#984ea3", "raw_text": "2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:", "details": "\n            2. **Use Decorators**: For AWS modules, use `@aws_handle_regions` to handle common AWS errors:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 130 - 130<br><strong>ID:</strong> rule_18\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d02bceaf0e", "name": "3. **Fail Loudly**: If an erro...", "group": "rule", "color": "#984ea3", "raw_text": "3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:", "details": "\n            3. **Fail Loudly**: If an error occurs, let it propagate up to the caller. This helps users identify and fix issues quickly:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 138 - 138<br><strong>ID:</strong> rule_19\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_64ff8649be", "name": "4. **Timeout Configuration**: ...", "group": "rule", "color": "#984ea3", "raw_text": "4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:", "details": "\n            4. **Timeout Configuration**: Set appropriate timeouts to avoid hanging:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> GET: Fetching Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 148 - 148<br><strong>ID:</strong> rule_20\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_8782cb0a0f", "name": "- **Required fields**: Use `da...", "group": "rule", "color": "#984ea3", "raw_text": "- **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings", "details": "\n            - **Required fields**: Use `data[\"field\"]` - let it fail if missing\n- **Optional fields**: Use `data.get(\"field\")` - defaults to `None`\n- **Consistency**: Use `None` for missing values, not empty strings<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> TRANSFORM: Shaping Data<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 175 - 177<br><strong>ID:</strong> rule_21\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_f4bce52c6c", "name": "- First parameter: Key in your...", "group": "rule", "color": "#984ea3", "raw_text": "- First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records", "details": "\n            - First parameter: Key in your data dict or kwarg name. Use keys when you are ingesting a list of records. Use kwargs when you want to set the same value for all records in the list of records.\n- `extra_index=True`: Create database index for better query performance\n- `set_in_kwargs=True`: Value comes from kwargs passed to `load()`, not from individual records<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Node Properties<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 207 - 209<br><strong>ID:</strong> rule_22\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_9c44f785ea", "name": "- `LinkDirection.OUTWARD`: `(:...", "group": "rule", "color": "#984ea3", "raw_text": "- `LinkDirection.OUTWARD`: `(:YourServiceUser)-[:RESOURCE]->(:YourServiceTenant)`\n- `LinkDirection.INWARD`: `(:YourServiceUser)<-[:RESOURCE]-(:YourServiceTenant)`", "details": "\n            - `LinkDirection.OUTWARD`: `(:YourServiceUser)-[:RESOURCE]->(:YourServiceTenant)`\n- `LinkDirection.INWARD`: `(:YourServiceUser)<-[:RESOURCE]-(:YourServiceTenant)`<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Relationships<br>\n            <strong>Format:</strong> ListItem<br>\n            <strong>Lines:</strong> 302 - 303<br><strong>ID:</strong> rule_23\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_17dc1aa0a2", "name": "**DO NOT add custom properties...", "group": "rule", "color": "#984ea3", "raw_text": "**DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.", "details": "\n            **DO NOT add custom properties to `CartographyRelSchema` or `CartographyNodeSchema` subclasses**: These dataclasses are processed by Cartography's core loading system, which only recognizes the standard fields defined in the base classes. Any additional fields you add will be ignored and have no effect.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 358 - 358<br><strong>ID:</strong> rule_24\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_180b7bf928", "name": "If you need conditional behavi...", "group": "rule", "color": "#984ea3", "raw_text": "If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.", "details": "\n            If you need conditional behavior, handle it in your transform function by setting field values to `None` when relationships shouldn't be created, or by filtering your data before calling `load()`.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 386 - 386<br><strong>ID:</strong> rule_25\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_925edf6c7c", "name": "**The Magic**: `one_to_many=Tr...", "group": "rule", "color": "#984ea3", "raw_text": "**The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.", "details": "\n            **The Magic**: `one_to_many=True` tells Cartography to create a relationship to each subnet whose `subnet_id` is in the `subnet_ids` list.<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Define One-to-Many Relationship<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 355 - 355<br><strong>ID:</strong> rule_26\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_cff38a5202", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass", "details": "\n            **Standard fields for `CartographyRelSchema`:**\n- `target_node_label`: str\n- `target_node_matcher`: TargetNodeMatcher\n- `direction`: LinkDirection\n- `rel_label`: str\n- `properties`: CartographyRelProperties subclass<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 378 - 383<br><strong>ID:</strong> rule_27\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_89f576516a", "name": "**Standard fields for `Cartogr...", "group": "rule", "color": "#984ea3", "raw_text": "**Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)", "details": "\n            **Standard fields for `CartographyNodeSchema`:**\n- `label`: str\n- `properties`: CartographyNodeProperties subclass\n- `sub_resource_relationship`: CartographyRelSchema subclass\n- `other_relationships`: OtherRelationships (optional)\n- `extra_node_labels`: ExtraNodeLabels (optional)\n- `scoped_cleanup`: bool (optional, defaults to True, almost should never be overridden. This is only used for intel modules that don't have a clear tenant-like entity.)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f Common Schema Mistakes to Avoid<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 385 - 391<br><strong>ID:</strong> rule_28\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_eea0a797d1", "name": "Set `scoped_cleanup=False` **O...", "group": "rule", "color": "#984ea3", "raw_text": "Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:", "details": "\n            Set `scoped_cleanup=False` **ONLY** for intel modules that don't have a clear tenant-like entity:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> \u26a0\ufe0f When to Override `scoped_cleanup`:<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 318 - 318<br><strong>ID:</strong> rule_29\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_43e92044df", "name": "All MatchLink relationship pro...", "group": "rule", "color": "#984ea3", "raw_text": "All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```", "details": "\n            All MatchLink relationship properties must include these mandatory fields:\n\n```python\n@dataclass(frozen=True)\nclass YourMatchLinkRelProperties(CartographyRelProperties):\n    # Required for all MatchLinks\n    lastupdated: PropertyRef = PropertyRef(\"lastupdated\", set_in_kwargs=True)\n    _sub_resource_label: PropertyRef = PropertyRef(\"_sub_resource_label\", set_in_kwargs=True)\n    _sub_resource_id: PropertyRef = PropertyRef(\"_sub_resource_id\", set_in_kwargs=True)\n\n    # Your custom properties here\n    custom_property: PropertyRef = PropertyRef(\"custom_property\")\n```<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Required MatchLink Properties<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 455 - 467<br><strong>ID:</strong> rule_30\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_73cfa53491", "name": "Always implement cleanup for M...", "group": "rule", "color": "#984ea3", "raw_text": "Always implement cleanup for MatchLinks:", "details": "\n            Always implement cleanup for MatchLinks:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> MatchLink Cleanup<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 469 - 469<br><strong>ID:</strong> rule_31\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_b02dfffe2d", "name": "Always validate your configura...", "group": "rule", "color": "#984ea3", "raw_text": "Always validate your configuration:", "details": "\n            Always validate your configuration:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Validation in Module<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 499 - 499<br><strong>ID:</strong> rule_32\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_38c67b13a7", "name": "Neo4j 4+ supports native Pytho...", "group": "rule", "color": "#984ea3", "raw_text": "Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:", "details": "\n            Neo4j 4+ supports native Python datetime objects and ISO 8601 formatted strings. Avoid manual datetime parsing:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Date Handling<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 530 - 530<br><strong>ID:</strong> rule_33\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_1e82e7fa6f", "name": "Always document your schema in...", "group": "rule", "color": "#984ea3", "raw_text": "Always document your schema in `docs/schema/your_service.md`:", "details": "\n            Always document your schema in `docs/schema/your_service.md`:<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Schema Documentation<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 617 - 617<br><strong>ID:</strong> rule_34\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_b5971618f5", "name": "**\u274c Don't use MatchLinks for:*...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios", "details": "\n            **\u274c Don't use MatchLinks for:**\n- Standard parent-child relationships (use `other_relationships` in node schema)\n- Simple one-to-many relationships (use `one_to_many=True` in standard relationships)\n- When you can define the relationship in the node schema\n- Performance-critical scenarios<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 447 - 451<br><strong>ID:</strong> rule_35\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_4301eff073", "name": "**\u2705 Use MatchLinks only for:**...", "group": "rule", "color": "#984ea3", "raw_text": "**\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes", "details": "\n            **\u2705 Use MatchLinks only for:**\n- Connecting two existing node types from separate data sources\n- Relationships with rich metadata that doesn't belong in nodes<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> When NOT to Use MatchLinks<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 453 - 455<br><strong>ID:</strong> rule_36\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_465d1c17ee", "name": "**\u2705 Correct Examples:**\n- **AW...", "group": "rule", "color": "#984ea3", "raw_text": "**\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)", "details": "\n            **\u2705 Correct Examples:**\n- **AWS Resources**: Point to `AWSAccount` (tenant = AWS account)\n- **Azure Resources**: Point to `AzureSubscription` (tenant = Azure subscription)\n- **GCP Resources**: Point to `GCPProject` (tenant = GCP project)\n- **SaaS Applications**: Point to `YourServiceTenant` (tenant = organization/company)\n- **GitHub Resources**: Point to `GitHubOrganization` (tenant = GitHub org)<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 230 - 235<br><strong>ID:</strong> rule_37\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_86139caa67", "name": "**\u274c Incorrect Examples:**\n- Po...", "group": "rule", "color": "#984ea3", "raw_text": "**\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries", "details": "\n            **\u274c Incorrect Examples:**\n- Pointing to a parent resource that's not tenant-like (e.g., `ECSTaskDefinition` \u2192 `ECSTask`)\n- Pointing to infrastructure components (e.g., `ECSContainer` \u2192 `ECSTask`)\n- Pointing to logical groupings that aren't organizational boundaries<br><br>\n            <hr>\n            <small>\n            <strong>Original Header:</strong> Sub-Resource Relationships: Always Point to Tenant-Like Objects<br>\n            <strong>Format:</strong> Paragraph<br>\n            <strong>Lines:</strong> 237 - 240<br><strong>ID:</strong> rule_38\n            </small>\n            ", "width": 231}, {"id": "rule_Implementation_Impl. Details_d3db1e53e0", "name": "**Example
